<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#c9e8f0"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a4f2e"/>
      <stop offset="100%" stop-color="#a0632e"/>
    </linearGradient>
    <linearGradient id="foliageBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a9e5a"/>
      <stop offset="100%" stop-color="#2a6e3a"/>
    </linearGradient>
    <linearGradient id="foliageFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf6e"/>
      <stop offset="100%" stop-color="#2e7d46"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#00e5aa"/>
    </linearGradient>
    <radialGradient id="appleShine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff9090"/>
      <stop offset="100%" stop-color="#cc2020"/>
    </radialGradient>
    <filter id="treeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="220" rx="18" fill="url(#skyGrad)"/>

  <!-- Ground -->
  <ellipse cx="100" cy="198" rx="85" ry="7" fill="#b8ddb0" opacity="0.4"/>
  <rect x="15" y="194" width="170" height="4" rx="2" fill="#8ec68a" opacity="0.7"/>

  <!-- TREE trunk -->
  <rect x="88" y="132" width="18" height="64" rx="5" fill="url(#trunkGrad)"/>
  <!-- Foliage back layers -->
  <ellipse cx="97" cy="103" rx="54" ry="43" fill="url(#foliageBack)" filter="url(#treeShadow)"/>
  <ellipse cx="70" cy="120" rx="27" ry="21" fill="#2e7d46"/>
  <ellipse cx="124" cy="118" rx="25" ry="19" fill="#2e7d46"/>
  <!-- Foliage front layers -->
  <ellipse cx="97" cy="80" rx="39" ry="31" fill="url(#foliageFront)"/>
  <ellipse cx="97" cy="67" rx="26" ry="21" fill="#5dc47a"/>
  <ellipse cx="88" cy="71" rx="11" ry="7" fill="#7de89a" opacity="0.35"/>

  <!-- Low hanging fruit left -->
  <line x1="66" y1="120" x2="60" y2="133" stroke="#4a3020" stroke-width="1.5"/>
  <circle cx="60" cy="140" r="7" fill="url(#appleShine)"/>
  <ellipse cx="57" cy="136" rx="2.5" ry="2" fill="#ffaaaa" opacity="0.45"/>
  <ellipse cx="63" cy="133" rx="4" ry="2" fill="#4caf6e" transform="rotate(30 63 133)"/>

  <!-- Low hanging fruit right -->
  <line x1="126" y1="119" x2="133" y2="131" stroke="#4a3020" stroke-width="1.5"/>
  <circle cx="133" cy="138" r="6.5" fill="url(#appleShine)"/>
  <ellipse cx="130" cy="134" rx="2" ry="1.5" fill="#ffaaaa" opacity="0.45"/>

  <!-- BAR CHART axes -->
  <line x1="28" y1="194" x2="28" y2="108" stroke="#33445a" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="194" x2="168" y2="194" stroke="#33445a" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="172" x2="28" y2="172" stroke="#33445a" stroke-width="1.2"/>
  <line x1="24" y1="150" x2="28" y2="150" stroke="#33445a" stroke-width="1.2"/>
  <line x1="24" y1="128" x2="28" y2="128" stroke="#33445a" stroke-width="1.2"/>

  <!-- Bars -->
  <rect x="36"  y="174" width="18" height="20" rx="3" fill="url(#barGrad)" opacity="0.85"/>
  <rect x="60"  y="159" width="18" height="35" rx="3" fill="url(#barGrad)" opacity="0.89"/>
  <rect x="84"  y="141" width="18" height="53" rx="3" fill="url(#barGrad)" opacity="0.93"/>
  <rect x="108" y="124" width="18" height="70" rx="3" fill="url(#barGrad)" opacity="0.97"/>
  <rect x="132" y="108" width="18" height="86" rx="3" fill="url(#barGrad)"/>

  <!-- Bar shines -->
  <rect x="38"  y="176" width="5" height="16" rx="2" fill="white" opacity="0.2"/>
  <rect x="62"  y="161" width="5" height="30" rx="2" fill="white" opacity="0.2"/>
  <rect x="86"  y="143" width="5" height="48" rx="2" fill="white" opacity="0.2"/>
  <rect x="110" y="126" width="5" height="64" rx="2" fill="white" opacity="0.2"/>
  <rect x="134" y="110" width="5" height="80" rx="2" fill="white" opacity="0.2"/>

  <!-- Trend line + arrowhead -->
  <polyline points="45,171 69,156 93,138 117,121 141,105" stroke="#ff6b35" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="141,105 134,109 138,115" fill="#ff6b35"/>

  <!-- CLIMBER on tall bars -->
  <line x1="120" y1="163" x2="115" y2="176" stroke="#1a2a5a" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="163" x2="126" y2="174" stroke="#1a2a5a" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="163" x2="121" y2="147" stroke="#1a2a5a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="121" y1="153" x2="136" y2="141" stroke="#1a2a5a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="121" y1="153" x2="111" y2="147" stroke="#1a2a5a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="122" cy="142" r="6" fill="#f4c07a"/>
  <path d="M116,140 Q118,134 128,138" stroke="#3a2a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="137" cy="140" r="2.2" fill="#f4c07a"/>

  <!-- PERSON PICKING LOW FRUIT standing casually -->
  <line x1="42" y1="194" x2="38" y2="194" stroke="#1a2a5a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="194" x2="54" y2="194" stroke="#1a2a5a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="194" x2="44" y2="178" stroke="#1a2a5a" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="194" x2="48" y2="178" stroke="#1a2a5a" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="178" x2="46" y2="162" stroke="#2a3a6a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="46" y1="168" x2="57" y2="162" stroke="#1a2a5a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="168" x2="40" y2="176" stroke="#1a2a5a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="46" cy="157" r="6" fill="#e8a868"/>
  <path d="M40,155 Q42,149 52,153" stroke="#2a1a0a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="58" cy="161" r="2.2" fill="#e8a868"/>

</svg>
