<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Apple body -->
  <ellipse cx="16" cy="21" rx="8.5" ry="7.5" fill="#22c55e"/>

  <!-- Apple top indent -->
  <ellipse cx="16" cy="14" rx="2.2" ry="1.1" fill="#0f172a"/>

  <!-- Stem -->
  <line x1="16.5" y1="13.5" x2="18" y2="9.5"
        stroke="#92400e" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Leaf -->
  <ellipse cx="21" cy="9" rx="3.2" ry="1.5"
           fill="#16a34a" transform="rotate(-25 21 9)"/>

  <!-- Highlight -->
  <circle cx="12.5" cy="18.5" r="1.8" fill="#ffffff" opacity="0.2"/>

  <!-- Cyan data dot — the "data" nod -->
  <circle cx="22" cy="22" r="2" fill="#38bdf8"/>
</svg>
