<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="200" height="200">
  <rect width="140" height="140" rx="18" fill="#0f172a"/>

  <!-- Bars -->
  <rect x="25" y="80" width="12" height="30" rx="3" fill="#38bdf8"/>
  <rect x="43" y="65" width="12" height="45" rx="3" fill="#38bdf8"/>
  <rect x="61" y="50" width="12" height="60" rx="3" fill="#38bdf8"/>
  <rect x="79" y="35" width="12" height="75" rx="3" fill="#38bdf8"/>

  <!-- Apple (refined data-point fruit) -->
  <g>
    <!-- Body -->
    <circle cx="49" cy="63" r="4.8" fill="#f43f5e"/>

    <!-- Subtle highlight -->
    <circle cx="47.5" cy="61.5" r="1.3" fill="#ffffff" opacity="0.35"/>

    <!-- Stem -->
    <line x1="49" y1="58.5" x2="49" y2="56.5"
          stroke="#a16207" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Leaf -->
    <ellipse cx="51.5" cy="57" rx="2" ry="1.1"
             fill="#22c55e" transform="rotate(25 51.5 57)"/>
  </g>

  <!-- Trend line -->
  <path d="M30 85 Q50 70 65 55 Q80 45 90 35"
        fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
</svg>
