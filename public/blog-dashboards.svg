<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">Dashboards Are Waiting Rooms:</text>
  <text x="510" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="30" font-weight="bold" fill="#38bdf8">Interconnectivity Is the Endgame</text>

  <!-- Left: Static dashboard (the "waiting room") -->
  <rect x="55" y="110" width="400" height="290" rx="10" fill="#071828" stroke="#334155" stroke-width="2"/>
  <rect x="55" y="110" width="400" height="34" rx="10" fill="#0d1117"/>
  <rect x="55" y="128" width="400" height="16" fill="#0d1117"/>
  <circle cx="78" cy="127" r="6" fill="#f43f5e" opacity="0.8"/>
  <circle cx="98" cy="127" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="118" cy="127" r="6" fill="#334155" opacity="0.8"/>
  <text x="255" y="132" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">dashboard.pbix — last refreshed 6h ago</text>

  <!-- Static KPI tiles (grayed out / stale) -->
  <rect x="70" y="156" width="170" height="60" rx="6" fill="#0d1f30" stroke="#1e293b" stroke-width="1"/>
  <text x="155" y="181" text-anchor="middle" font-family="ui-monospace,monospace" font-size="20" font-weight="bold" fill="#334155">$4.2M</text>
  <text x="155" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">revenue (stale)</text>

  <rect x="255" y="156" width="185" height="60" rx="6" fill="#0d1f30" stroke="#1e293b" stroke-width="1"/>
  <text x="347" y="181" text-anchor="middle" font-family="ui-monospace,monospace" font-size="20" font-weight="bold" fill="#334155">3.8%</text>
  <text x="347" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">churn (stale)</text>

  <!-- Static bar chart (muted) -->
  <rect x="70" y="228" width="170" height="120" rx="6" fill="#071828" stroke="#1e293b" stroke-width="1"/>
  <rect x="85" y="305" width="22" height="32" rx="2" fill="#334155" opacity="0.6"/>
  <rect x="114" y="290" width="22" height="47" rx="2" fill="#334155" opacity="0.6"/>
  <rect x="143" y="278" width="22" height="59" rx="2" fill="#334155" opacity="0.6"/>
  <rect x="172" y="285" width="22" height="52" rx="2" fill="#334155" opacity="0.6"/>
  <text x="155" y="360" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">monthly trend</text>

  <!-- Static line chart (muted) -->
  <rect x="255" y="228" width="185" height="120" rx="6" fill="#071828" stroke="#1e293b" stroke-width="1"/>
  <polyline points="275,320 305,305 335,310 365,295 395,300 420,285" fill="none" stroke="#334155" stroke-width="2"/>
  <text x="347" y="360" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">user growth</text>

  <!-- "Waiting" person icon -->
  <circle cx="255" cy="420" r="12" fill="#0d1f30" stroke="#334155" stroke-width="1.5"/>
  <line x1="255" y1="432" x2="255" y2="460" stroke="#334155" stroke-width="2"/>
  <line x1="255" y1="445" x2="240" y2="455" stroke="#334155" stroke-width="2"/>
  <line x1="255" y1="445" x2="270" y2="455" stroke="#334155" stroke-width="2"/>
  <text x="255" y="480" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">waiting for insight…</text>

  <!-- Center divider with label -->
  <line x1="480" y1="110" x2="480" y2="400" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="510" y="265" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569" transform="rotate(-90 510 265)">vs</text>

  <!-- Right: Interconnected / live system -->
  <rect x="538" y="110" width="435" height="290" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <text x="755" y="135" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">Connected Data Ecosystem</text>

  <!-- Pipeline node -->
  <rect x="558" y="152" width="120" height="38" rx="8" fill="#0d1f30" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="618" y="175" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">Pipeline</text>

  <!-- Alert node -->
  <rect x="558" y="210" width="120" height="38" rx="8" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="618" y="233" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">⚡ Alerts</text>

  <!-- API node -->
  <rect x="558" y="268" width="120" height="38" rx="8" fill="#0d1f30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="618" y="291" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#a78bfa">REST API</text>

  <!-- Central hub -->
  <circle cx="755" cy="255" r="48" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <text x="755" y="250" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">Live</text>
  <text x="755" y="268" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">Data</text>

  <!-- Connections to hub -->
  <line x1="678" y1="171" x2="710" y2="240" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
  <line x1="678" y1="229" x2="710" y2="255" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <line x1="678" y1="287" x2="710" y2="268" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Output nodes -->
  <rect x="838" y="152" width="120" height="38" rx="8" fill="#0a2a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="898" y="175" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">Slack Alert</text>

  <rect x="838" y="210" width="120" height="38" rx="8" fill="#0a2a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="898" y="233" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">Auto-Report</text>

  <rect x="838" y="268" width="120" height="38" rx="8" fill="#0a2a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="898" y="291" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">Action Trigger</text>

  <!-- Connections from hub to outputs -->
  <line x1="803" y1="240" x2="836" y2="171" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <line x1="803" y1="255" x2="836" y2="229" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <line x1="803" y1="268" x2="836" y2="287" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>

  <!-- Pulse dots on lines -->
  <circle cx="725" cy="246" r="4" fill="#38bdf8" opacity="0.9"/>
  <circle cx="820" cy="246" r="4" fill="#22c55e" opacity="0.9"/>

  <!-- Active person (right) -->
  <circle cx="755" cy="420" r="12" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="755" y1="432" x2="755" y2="460" stroke="#38bdf8" stroke-width="2"/>
  <line x1="755" y1="445" x2="740" y2="455" stroke="#38bdf8" stroke-width="2"/>
  <line x1="755" y1="445" x2="770" y2="455" stroke="#38bdf8" stroke-width="2"/>
  <text x="755" y="480" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">acting on live signals</text>
</svg>
