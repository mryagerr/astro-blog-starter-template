<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="22" font-weight="bold" fill="#e2e8f0">Stop Guessing When</text>
  <text x="510" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="bold" fill="#38bdf8">Medical Devices Will Fail</text>

  <!-- Device nodes (left column) -->
  <!-- Device 1 (healthy) -->
  <rect x="55" y="140" width="130" height="70" rx="10" fill="#071828" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="165" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">device-0041</text>
  <text x="120" y="185" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">● OK</text>
  <text x="120" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">uptime 99.8%</text>

  <!-- Device 2 (warning) -->
  <rect x="55" y="230" width="130" height="70" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="255" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">device-0087</text>
  <text x="120" y="275" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#f59e0b">⚠ WARN</text>
  <text x="120" y="292" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">temp rising</text>

  <!-- Device 3 (critical) -->
  <rect x="55" y="320" width="130" height="70" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="2"/>
  <text x="120" y="345" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">device-0112</text>
  <text x="120" y="365" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#f43f5e">✗ CRITICAL</text>
  <text x="120" y="382" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">failure imminent</text>

  <!-- Device 4 (healthy) -->
  <rect x="55" y="410" width="130" height="55" rx="10" fill="#071828" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="432" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">device-0203</text>
  <text x="120" y="450" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">● OK</text>

  <!-- Lines to IoT hub -->
  <line x1="185" y1="175" x2="270" y2="265" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="185" y1="265" x2="270" y2="280" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="185" y1="355" x2="270" y2="295" stroke="#f43f5e" stroke-width="1.5" opacity="0.5"/>
  <line x1="185" y1="437" x2="270" y2="310" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <!-- AWS IoT Core hub -->
  <rect x="270" y="235" width="155" height="100" rx="12" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <text x="348" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">AWS IoT Core</text>
  <text x="348" y="290" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">MQTT broker</text>
  <text x="348" y="310" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">telemetry ingestion</text>
  <text x="348" y="328" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">12.4k msg/sec</text>

  <!-- Arrow to Lambda -->
  <line x1="425" y1="285" x2="490" y2="285" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="483,278 498,285 483,292" fill="#38bdf8"/>

  <!-- Lambda -->
  <rect x="498" y="248" width="130" height="74" rx="10" fill="#071828" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="563" y="272" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#f59e0b">λ Lambda</text>
  <text x="563" y="292" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">anomaly detect</text>
  <text x="563" y="310" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">threshold alerts</text>

  <!-- Arrow to S3 + CloudWatch -->
  <line x1="628" y1="285" x2="695" y2="200" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="689,207 700,194 703,208" fill="#38bdf8"/>
  <line x1="628" y1="285" x2="695" y2="370" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="689,363 700,376 703,362" fill="#38bdf8"/>

  <!-- S3 storage -->
  <rect x="700" y="155" width="140" height="68" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="770" y="180" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">S3 Bucket</text>
  <text x="770" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">raw telemetry log</text>
  <text x="770" y="215" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">7.2 TB stored</text>

  <!-- CloudWatch / alert -->
  <rect x="700" y="338" width="140" height="68" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="770" y="362" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#f43f5e">CloudWatch</text>
  <text x="770" y="380" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">alert → SNS</text>
  <text x="770" y="397" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#f43f5e">1 alert triggered</text>

  <!-- Arrow to dashboard -->
  <line x1="840" y1="189" x2="905" y2="260" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="840" y1="372" x2="905" y2="300" stroke="#f43f5e" stroke-width="1.5" opacity="0.6"/>

  <!-- Dashboard panel -->
  <rect x="900" y="215" width="100" height="130" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="950" y="238" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">Dashboard</text>
  <!-- Mini bar chart in dashboard -->
  <rect x="914" y="295" width="8" height="30" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="926" y="285" width="8" height="40" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="938" y="270" width="8" height="55" rx="1" fill="#f59e0b" opacity="0.7"/>
  <rect x="950" y="260" width="8" height="65" rx="1" fill="#f43f5e" opacity="0.7"/>
  <rect x="962" y="280" width="8" height="45" rx="1" fill="#f59e0b" opacity="0.7"/>
  <rect x="974" y="300" width="8" height="25" rx="1" fill="#22c55e" opacity="0.7"/>
  <line x1="910" y1="328" x2="988" y2="328" stroke="#334155" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="510" y="485" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">predict failures before they happen · AWS IoT + Lambda</text>
</svg>
