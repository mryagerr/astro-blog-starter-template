<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- API request/response flow -->

  <!-- Client box -->
  <rect x="60" y="195" width="180" height="120" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="150" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">CLIENT</text>
  <text x="150" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">GET /data</text>
  <text x="150" y="290" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">Authorization: Bearer</text>

  <!-- Arrow right: request -->
  <line x1="243" y1="255" x2="400" y2="255" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="393,248 410,255 393,262" fill="#f59e0b"/>
  <text x="322" y="243" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">request</text>

  <!-- API box -->
  <rect x="413" y="195" width="180" height="120" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="503" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f59e0b">REST API</text>
  <text x="503" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">rate limit: 100/min</text>
  <text x="503" y="290" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">pagination: cursor</text>

  <!-- Arrow right: response -->
  <line x1="596" y1="255" x2="753" y2="255" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="746,248 763,255 746,262" fill="#22c55e"/>
  <text x="675" y="243" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">200 OK</text>

  <!-- Storage box -->
  <rect x="766" y="195" width="180" height="120" rx="10" fill="#001a0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="856" y="241" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">STORAGE</text>
  <ellipse cx="856" cy="268" rx="42" ry="12" fill="#22c55e" opacity="0.6"/>
  <rect x="814" y="268" width="84" height="20" fill="#22c55e" opacity="0.3"/>
  <ellipse cx="856" cy="288" rx="42" ry="12" fill="#22c55e" opacity="0.6"/>

  <!-- Status bar -->
  <rect x="60" y="370" width="886" height="6" rx="3" fill="#1e293b"/>
  <rect x="60" y="370" width="295" height="6" rx="3" fill="#38bdf8"/>
  <rect x="355" y="370" width="296" height="6" rx="3" fill="#f59e0b"/>
  <rect x="651" y="370" width="295" height="6" rx="3" fill="#22c55e"/>

  <!-- Title area -->
  <text x="503" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Pulling Data from</text>
  <text x="503" y="155" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#38bdf8">REST APIs</text>
  <text x="503" y="440" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">Low Hanging Data</text>
</svg>
