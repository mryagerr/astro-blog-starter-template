<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Stock Prediction Classifier</text>
  <text x="510" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="bold" fill="#38bdf8">with scikit-learn</text>

  <!-- Decision boundary plot (left half) -->
  <rect x="55" y="115" width="430" height="310" rx="12" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="270" y="140" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">SVM Decision Boundary</text>

  <!-- Axes -->
  <line x1="95" y1="155" x2="95" y2="395" stroke="#334155" stroke-width="1.5"/>
  <line x1="95" y1="395" x2="460" y2="395" stroke="#334155" stroke-width="1.5"/>
  <text x="270" y="413" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">RSI</text>
  <text x="74" y="275" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569" transform="rotate(-90 74 275)">MACD</text>

  <!-- Decision boundary curve -->
  <path d="M 115 165 Q 180 220 230 280 Q 280 340 330 390" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="10,4"/>

  <!-- BUY region (upper right) - green dots -->
  <circle cx="310" cy="185" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="350" cy="210" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="390" cy="175" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="420" cy="220" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="340" cy="250" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="410" cy="260" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="380" cy="300" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="450" cy="180" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="435" cy="310" r="5" fill="#22c55e" opacity="0.85"/>
  <circle cx="290" cy="230" r="5" fill="#22c55e" opacity="0.85"/>

  <!-- SELL region (lower left) - red dots -->
  <circle cx="130" cy="350" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="160" cy="320" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="115" cy="300" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="195" cy="370" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="150" cy="385" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="120" cy="260" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="165" cy="240" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="200" cy="310" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="220" cy="355" r="5" fill="#f43f5e" opacity="0.85"/>
  <circle cx="135" cy="215" r="5" fill="#f43f5e" opacity="0.85"/>

  <!-- Misclassified (crossed) -->
  <circle cx="270" cy="310" r="5" fill="#22c55e" opacity="0.5"/>
  <line x1="265" y1="305" x2="275" y2="315" stroke="#f43f5e" stroke-width="2"/>
  <line x1="275" y1="305" x2="265" y2="315" stroke="#f43f5e" stroke-width="2"/>
  <circle cx="250" cy="230" r="5" fill="#f43f5e" opacity="0.5"/>
  <line x1="245" y1="225" x2="255" y2="235" stroke="#22c55e" stroke-width="2"/>
  <line x1="255" y1="225" x2="245" y2="235" stroke="#22c55e" stroke-width="2"/>

  <!-- Legend -->
  <circle cx="115" cy="168" r="5" fill="#22c55e"/>
  <text x="127" y="173" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">BUY</text>
  <circle cx="165" cy="168" r="5" fill="#f43f5e"/>
  <text x="177" y="173" font-family="ui-monospace,monospace" font-size="9" fill="#f43f5e">SELL</text>
  <line x1="210" y1="168" x2="225" y2="168" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="232" y="173" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">boundary</text>

  <!-- Right half: model metrics -->
  <rect x="530" y="115" width="435" height="310" rx="12" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="748" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">Classification Report</text>

  <!-- Confusion matrix header -->
  <text x="555" y="170" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">from sklearn.svm import</text>
  <text x="747" y="170" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0"> SVC</text>
  <text x="555" y="190" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">from sklearn.metrics import</text>
  <text x="555" y="210" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">    classification_report</text>

  <line x1="550" y1="220" x2="950" y2="220" stroke="#1e293b" stroke-width="1"/>

  <!-- Metrics table -->
  <text x="555" y="242" font-family="ui-monospace,monospace" font-size="11" fill="#475569">             precision  recall  f1</text>
  <line x1="550" y1="250" x2="950" y2="250" stroke="#1e293b" stroke-width="1"/>
  <text x="555" y="270" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">BUY  </text>
  <text x="613" y="270" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">       0.64      0.58   0.61</text>
  <text x="555" y="292" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">SELL </text>
  <text x="613" y="292" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">       0.59      0.65   0.62</text>
  <text x="555" y="314" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">HOLD </text>
  <text x="613" y="314" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">       0.61      0.61   0.61</text>
  <line x1="550" y1="323" x2="950" y2="323" stroke="#1e293b" stroke-width="1"/>
  <text x="555" y="342" font-family="ui-monospace,monospace" font-size="11" fill="#475569">accuracy</text>
  <text x="750" y="342" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">              0.61</text>

  <!-- Accuracy bar -->
  <rect x="553" y="358" width="360" height="12" rx="5" fill="#1e293b"/>
  <rect x="553" y="358" width="220" height="12" rx="5" fill="#38bdf8" opacity="0.7"/>
  <text x="553" y="387" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">61% accuracy</text>
  <text x="748" y="387" font-family="ui-monospace,monospace" font-size="10" fill="#475569">better than coin flip</text>

  <!-- Tagline -->
  <text x="510" y="470" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">supervised learning · SVM · stock classification</text>
</svg>
