  <!-- Y axis -->
  <line x1="90" y1="140" x2="90" y2="374" stroke="#38bdf8" stroke-width="1" opacity="0.25"/>
  <!-- X axis -->
  <line x1="90" y1="374" x2="960" y2="374" stroke="#38bdf8" stroke-width="1" opacity="0.25"/>
  <!-- Y axis labels -->
  <text x="84" y="154" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#475569">195</text>
  <text x="84" y="194" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#475569">190</text>
  <text x="84" y="234" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#475569">185</text>
  <text x="84" y="274" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#475569">180</text>
  <text x="84" y="314" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#475569">175</text>
  <text x="84" y="354" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#475569">170</text>
  <!-- Grid lines -->
  <line x1="90" y1="154" x2="960" y2="154" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>
  <line x1="90" y1="194" x2="960" y2="194" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>
  <line x1="90" y1="234" x2="960" y2="234" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>
  <line x1="90" y1="274" x2="960" y2="274" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>
  <line x1="90" y1="314" x2="960" y2="314" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>

  <!-- Candlesticks: 14 candles across the chart -->
  <!-- Each candle: wick line + body rect. Green=up (#22c55e), Red=down (#f43f5e) -->
  <!-- c1 up -->
  <line x1="116" y1="302" x2="116" y2="258" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="110" y="268" width="12" height="24" rx="1" fill="#22c55e"/>
  <!-- c2 up -->
  <line x1="182" y1="290" x2="182" y2="252" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="176" y="260" width="12" height="22" rx="1" fill="#22c55e"/>
  <!-- c3 down -->
  <line x1="248" y1="256" x2="248" y2="296" stroke="#f43f5e" stroke-width="1.5"/>
  <rect x="242" y="264" width="12" height="22" rx="1" fill="#f43f5e"/>
  <!-- c4 up -->
  <line x1="314" y1="274" x2="314" y2="238" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="308" y="244" width="12" height="22" rx="1" fill="#22c55e"/>
  <!-- c5 up -->
  <line x1="380" y1="258" x2="380" y2="218" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="374" y="226" width="12" height="24" rx="1" fill="#22c55e"/>
  <!-- c6 down -->
  <line x1="446" y1="218" x2="446" y2="254" stroke="#f43f5e" stroke-width="1.5"/>
  <rect x="440" y="226" width="12" height="18" rx="1" fill="#f43f5e"/>
  <!-- c7 up -->
  <line x1="512" y1="240" x2="512" y2="202" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="506" y="210" width="12" height="22" rx="1" fill="#22c55e"/>
  <!-- c8 up -->
  <line x1="578" y1="224" x2="578" y2="186" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="572" y="194" width="12" height="22" rx="1" fill="#22c55e"/>
  <!-- c9 down -->
  <line x1="644" y1="186" x2="644" y2="218" stroke="#f43f5e" stroke-width="1.5"/>
  <rect x="638" y="192" width="12" height="18" rx="1" fill="#f43f5e"/>
  <!-- c10 down -->
  <line x1="710" y1="200" x2="710" y2="238" stroke="#f43f5e" stroke-width="1.5"/>
  <rect x="704" y="208" width="12" height="22" rx="1" fill="#f43f5e"/>
  <!-- c11 up -->
  <line x1="776" y1="222" x2="776" y2="184" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="770" y="192" width="12" height="22" rx="1" fill="#22c55e"/>
  <!-- c12 up -->
  <line x1="842" y1="208" x2="842" y2="168" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="836" y="176" width="12" height="24" rx="1" fill="#22c55e"/>
  <!-- c13 down -->
  <line x1="908" y1="166" x2="908" y2="200" stroke="#f43f5e" stroke-width="1.5"/>
  <rect x="902" y="174" width="12" height="18" rx="1" fill="#f43f5e"/>
  <!-- c14 up -->
  <line x1="950" y1="186" x2="950" y2="154" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="944" y="162" width="12" height="16" rx="1" fill="#22c55e"/>

  <!-- SMA-20 line -->
  <polyline points="116,288 182,276 248,268 314,260 380,248 446,244 512,234 578,222 644,214 710,210 776,204 842,194 908,184 950,176" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" opacity="0.85"/>

  <!-- Labels -->
  <text x="960" y="174" font-family="ui-monospace,monospace" font-size="9" fill="#f59e0b">SMA-20</text>

  <!-- X axis date labels -->
  <text x="116" y="386" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jan 2</text>
  <text x="314" y="386" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jan 8</text>
  <text x="512" y="386" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jan 12</text>
  <text x="710" y="386" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jan 18</text>
  <text x="908" y="386" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jan 24</text>

  <!-- Legend -->
  <rect x="760" y="120" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="778" y="131" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">Up</text>
  <rect x="820" y="120" width="12" height="12" rx="2" fill="#f43f5e"/>
  <text x="838" y="131" font-family="ui-monospace,monospace" font-size="10" fill="#f43f5e">Down</text>
  <line x1="895" y1="126" x2="920" y2="126" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="926" y="131" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">SMA</text>

  <!-- Query block -->
  <rect x="40" y="402" width="940" height="68" rx="10" fill="#0d1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="66" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">SELECT</text>
  <text x="122" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> date, close, </text>
  <text x="256" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">AVG</text>
  <text x="284" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(close) </text>
  <text x="357" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">OVER</text>
  <text x="396" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> (... </text>
  <text x="441" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">ROWS BETWEEN</text>
  <text x="570" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b"> 19 </text>
  <text x="600" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">PRECEDING</text>
  <text x="680" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8"> AND CURRENT ROW</text>
  <text x="856" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">) </text>
  <text x="878" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">AS</text>
  <text x="900" y="426" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b"> sma_20</text>
  <text x="66" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">FROM</text>
  <text x="112" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e"> 'prices.parquet'  </text>
  <text x="280" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">WINDOW</text>
  <text x="348" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> w </text>
  <text x="368" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">AS</text>
  <text x="390" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> (</text>
  <text x="406" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">PARTITION BY</text>
  <text x="506" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> ticker </text>
  <text x="564" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">ORDER BY</text>
  <text x="640" y="452" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> date)</text>
</svg>
