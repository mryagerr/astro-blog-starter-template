<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="65" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Pulling Data from</text>
  <text x="510" y="103" text-anchor="middle" font-family="ui-monospace,monospace" font-size="38" font-weight="bold" fill="#38bdf8">REST APIs</text>

  <!-- CLIENT box -->
  <rect x="50" y="185" width="220" height="155" rx="14" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <!-- Monitor icon -->
  <rect x="90" y="205" width="140" height="90" rx="6" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <rect x="90" y="205" width="140" height="22" rx="6" fill="#38bdf8" opacity="0.2"/>
  <line x1="145" y1="295" x2="145" y2="308" stroke="#38bdf8" stroke-width="2"/>
  <line x1="175" y1="295" x2="175" y2="308" stroke="#38bdf8" stroke-width="2"/>
  <line x1="128" y1="308" x2="192" y2="308" stroke="#38bdf8" stroke-width="2.5"/>
  <!-- Code lines on screen -->
  <line x1="100" y1="240" x2="155" y2="240" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="252" x2="140" y2="252" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="264" x2="148" y2="264" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="276" x2="130" y2="276" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
  <text x="160" y="324" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="bold" fill="#38bdf8">CLIENT</text>

  <!-- REQUEST arrow -->
  <line x1="275" y1="238" x2="720" y2="238" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="713,231 728,238 713,245" fill="#f59e0b"/>
  <!-- Request label -->
  <rect x="340" y="205" width="300" height="24" rx="6" fill="#1a1200"/>
  <text x="490" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">GET /api/v1/data?limit=100</text>
  <!-- Auth badge -->
  <rect x="390" y="177" width="200" height="20" rx="5" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="490" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b" opacity="0.8">Authorization: Bearer eyJ...</text>

  <!-- RESPONSE arrow -->
  <line x1="720" y1="280" x2="275" y2="280" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="282,273 267,280 282,287" fill="#22c55e"/>
  <!-- Response label -->
  <rect x="340" y="288" width="300" height="24" rx="6" fill="#001a0a"/>
  <text x="490" y="305" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">200 OK  { "data": [ ... ] }</text>

  <!-- SERVER box -->
  <rect x="750" y="185" width="220" height="155" rx="14" fill="#001a0a" stroke="#22c55e" stroke-width="2"/>
  <!-- Server rack icon -->
  <rect x="800" y="210" width="120" height="24" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="814" cy="222" r="5" fill="#22c55e" opacity="0.8"/>
  <line x1="826" y1="222" x2="908" y2="222" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <rect x="800" y="242" width="120" height="24" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="814" cy="254" r="5" fill="#22c55e" opacity="0.5"/>
  <line x1="826" y1="254" x2="908" y2="254" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <rect x="800" y="274" width="120" height="24" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="814" cy="286" r="5" fill="#22c55e" opacity="0.8"/>
  <line x1="826" y1="286" x2="908" y2="286" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <text x="860" y="324" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="bold" fill="#22c55e">SERVER</text>

  <!-- HTTP method badges at bottom -->
  <rect x="120" y="390" width="64" height="26" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="152" y="408" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#22c55e">GET</text>

  <rect x="206" y="390" width="64" height="26" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="238" y="408" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f59e0b">POST</text>

  <rect x="292" y="390" width="64" height="26" rx="6" fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="324" y="408" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">PUT</text>

  <rect x="378" y="390" width="76" height="26" rx="6" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="416" y="408" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f43f5e">DELETE</text>

  <!-- Status codes -->
  <text x="560" y="408" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">200 </text>
  <text x="600" y="408" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">301 </text>
  <text x="640" y="408" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">401 </text>
  <text x="680" y="408" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">404 </text>
  <text x="720" y="408" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">429 </text>
  <text x="760" y="408" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">500</text>

  <text x="510" y="462" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#334155">auth · pagination · rate limiting · error handling</text>
</svg>
