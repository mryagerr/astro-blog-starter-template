<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Low Hanging Fruit</text>
  <text x="510" y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#38bdf8">Reduces Risk, Builds Expertise</text>

  <!-- Tree trunk -->
  <rect x="460" y="320" width="30" height="130" rx="4" fill="#1e293b"/>
  <!-- Roots -->
  <line x1="475" y1="440" x2="420" y2="470" stroke="#1e293b" stroke-width="3"/>
  <line x1="475" y1="440" x2="530" y2="470" stroke="#1e293b" stroke-width="3"/>
  <line x1="475" y1="450" x2="475" y2="475" stroke="#1e293b" stroke-width="3"/>

  <!-- Tree canopy layers -->
  <!-- Top (high risk, complex) -->
  <ellipse cx="475" cy="200" rx="100" ry="65" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Middle -->
  <ellipse cx="475" cy="270" rx="135" ry="65" fill="#071a2e" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Low (easy reach) -->
  <ellipse cx="475" cy="340" rx="160" ry="60" fill="#071a2e" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Fruit at different levels -->
  <!-- High fruit (red/orange = risky) -->
  <circle cx="430" cy="175" r="12" fill="#f43f5e" opacity="0.7"/>
  <circle cx="475" cy="158" r="12" fill="#f43f5e" opacity="0.7"/>
  <circle cx="520" cy="175" r="12" fill="#f43f5e" opacity="0.7"/>

  <!-- Mid fruit (yellow = moderate) -->
  <circle cx="410" cy="255" r="13" fill="#f59e0b" opacity="0.75"/>
  <circle cx="450" cy="240" r="13" fill="#f59e0b" opacity="0.75"/>
  <circle cx="500" cy="240" r="13" fill="#f59e0b" opacity="0.75"/>
  <circle cx="540" cy="255" r="13" fill="#f59e0b" opacity="0.75"/>

  <!-- Low fruit (green = easy wins) -->
  <circle cx="355" cy="330" r="14" fill="#22c55e" opacity="0.85"/>
  <circle cx="395" cy="315" r="14" fill="#22c55e" opacity="0.85"/>
  <circle cx="440" cy="308" r="14" fill="#22c55e" opacity="0.85"/>
  <circle cx="510" cy="308" r="14" fill="#22c55e" opacity="0.85"/>
  <circle cx="555" cy="315" r="14" fill="#22c55e" opacity="0.85"/>
  <circle cx="595" cy="330" r="14" fill="#22c55e" opacity="0.85"/>

  <!-- Labels on right side -->
  <!-- Risk levels -->
  <line x1="590" y1="175" x2="640" y2="175" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="645" y="170" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">high risk</text>
  <text x="645" y="184" font-family="ui-monospace,monospace" font-size="11" fill="#475569">complex · expensive</text>

  <line x1="620" y1="248" x2="640" y2="248" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="645" y="243" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">medium risk</text>
  <text x="645" y="257" font-family="ui-monospace,monospace" font-size="11" fill="#475569">needs prior wins</text>

  <line x1="640" y1="320" x2="660" y2="320" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="665" y="315" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">low risk · start here</text>
  <text x="665" y="329" font-family="ui-monospace,monospace" font-size="11" fill="#475569">fast wins · build cred</text>

  <!-- Person picking low fruit -->
  <circle cx="310" cy="345" r="14" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <line x1="310" y1="359" x2="310" y2="400" stroke="#38bdf8" stroke-width="2"/>
  <line x1="310" y1="375" x2="290" y2="395" stroke="#38bdf8" stroke-width="2"/>
  <line x1="310" y1="375" x2="340" y2="360" stroke="#38bdf8" stroke-width="2"/>
  <line x1="310" y1="400" x2="295" y2="430" stroke="#38bdf8" stroke-width="2"/>
  <line x1="310" y1="400" x2="325" y2="430" stroke="#38bdf8" stroke-width="2"/>
  <!-- Arm reaching for fruit -->
  <line x1="340" y1="360" x2="358" y2="332" stroke="#38bdf8" stroke-width="2"/>

  <!-- Bottom tagline -->
  <text x="510" y="478" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">every easy win teaches you something — climb higher as expertise compounds</text>
</svg>
