<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="55" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">Don't Build Analytical</text>
  <text x="510" y="95" text-anchor="middle" font-family="ui-monospace,monospace" font-size="38" font-weight="bold" fill="#38bdf8">Castles on Sand</text>

  <!-- Crumbling foundation (ground line, uneven) -->
  <polyline points="55,430 140,432 210,425 290,435 370,428 450,440 530,430 610,438 690,427 780,435 855,430 965,432" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- Stable tower (left) — solid foundation, straight columns -->
  <rect x="80" y="290" width="160" height="140" rx="4" fill="#071a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="80" y="290" width="160" height="22" rx="4" fill="#38bdf8" opacity="0.2"/>
  <text x="160" y="307" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">FOUNDATION</text>
  <!-- Stable data bars inside -->
  <rect x="100" y="355" width="18" height="60" rx="2" fill="#38bdf8" opacity="0.7"/>
  <rect x="126" y="335" width="18" height="80" rx="2" fill="#38bdf8" opacity="0.7"/>
  <rect x="152" y="345" width="18" height="70" rx="2" fill="#38bdf8" opacity="0.7"/>
  <rect x="178" y="320" width="18" height="95" rx="2" fill="#0891b2" opacity="0.8"/>
  <!-- Tower top -->
  <rect x="80" y="250" width="160" height="42" rx="4" fill="#071a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="160" y="276" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">✓ Reliable</text>
  <!-- Ground label -->
  <text x="160" y="460" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">clean data</text>

  <!-- Crumbling tower (right) — tilted, broken -->
  <!-- Tilted base block -->
  <rect x="680" y="305" width="180" height="130" rx="4" fill="#1a0a00" stroke="#f59e0b" stroke-width="1.5" transform="rotate(3 770 370)"/>
  <!-- Cracks -->
  <polyline points="730,340 740,360 728,380" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <polyline points="790,350 800,370 788,390" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <!-- Broken bars inside -->
  <rect x="700" y="360" width="18" height="55" rx="2" fill="#f59e0b" opacity="0.4" transform="rotate(2 709 387)"/>
  <rect x="727" y="348" width="18" height="55" rx="2" fill="#f59e0b" opacity="0.4" transform="rotate(-2 736 375)"/>
  <rect x="754" y="340" width="18" height="55" rx="2" fill="#f59e0b" opacity="0.3" transform="rotate(3 763 367)"/>
  <rect x="800" y="355" width="18" height="40" rx="2" fill="#f59e0b" opacity="0.4" transform="rotate(-3 809 375)"/>
  <!-- Crumbling top (tilted) -->
  <rect x="675" y="263" width="180" height="44" rx="4" fill="#1a0a00" stroke="#f59e0b" stroke-width="1.5" transform="rotate(5 765 285)"/>
  <text x="765" y="292" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f59e0b" transform="rotate(5 765 285)">⚠ Unstable</text>
  <!-- Debris/falling pieces -->
  <rect x="870" y="395" width="12" height="10" rx="2" fill="#f59e0b" opacity="0.5" transform="rotate(25 876 400)"/>
  <rect x="890" y="410" width="8" height="7" rx="1" fill="#f59e0b" opacity="0.4" transform="rotate(-15 894 413)"/>
  <rect x="855" y="415" width="10" height="8" rx="1" fill="#f59e0b" opacity="0.3" transform="rotate(10 860 419)"/>
  <!-- Ground label -->
  <text x="770" y="460" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">dirty data</text>

  <!-- Center divider / vs label -->
  <line x1="400" y1="240" x2="400" y2="445" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="480" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">vs</text>

  <!-- Key insight bar -->
  <rect x="350" y="250" width="320" height="52" rx="10" fill="#0d1f30" stroke="#38bdf8" stroke-width="1"/>
  <text x="510" y="271" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">technical debt compounds over time</text>
  <rect x="362" y="281" width="296" height="7" rx="3" fill="#1e293b"/>
  <rect x="362" y="281" width="80" height="7" rx="3" fill="#38bdf8" opacity="0.6"/>
  <rect x="444" y="281" width="90" height="7" rx="3" fill="#f59e0b" opacity="0.6"/>
  <rect x="536" y="281" width="122" height="7" rx="3" fill="#f43f5e" opacity="0.6"/>
</svg>
