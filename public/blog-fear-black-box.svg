<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">Fear the Black Box:</text>
  <text x="510" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="30" font-weight="bold" fill="#38bdf8">Data Must Be Understood End to End</text>

  <!-- Input labels (left) -->
  <text x="68" y="195" font-family="ui-monospace,monospace" font-size="12" fill="#475569">features[ ]</text>
  <text x="68" y="265" font-family="ui-monospace,monospace" font-size="12" fill="#475569">train_data</text>
  <text x="68" y="335" font-family="ui-monospace,monospace" font-size="12" fill="#475569">weights[ ]</text>

  <!-- Input arrows -->
  <line x1="175" y1="192" x2="310" y2="245" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="175" y1="262" x2="310" y2="270" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="175" y1="332" x2="310" y2="295" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <polygon points="308,239 316,246 306,251" fill="#38bdf8" opacity="0.6"/>
  <polygon points="308,265 316,270 308,276" fill="#38bdf8" opacity="0.6"/>
  <polygon points="308,291 316,296 308,301" fill="#38bdf8" opacity="0.6"/>

  <!-- Black box -->
  <rect x="310" y="190" width="280" height="150" rx="8" fill="#080c14" stroke="#f43f5e" stroke-width="2"/>
  <rect x="310" y="190" width="280" height="34" rx="8" fill="#120507"/>
  <rect x="310" y="208" width="280" height="16" fill="#120507"/>
  <circle cx="334" cy="207" r="6" fill="#f43f5e" opacity="0.7"/>
  <circle cx="354" cy="207" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="374" cy="207" r="6" fill="#334155" opacity="0.7"/>
  <text x="450" y="212" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#334155">model.pkl</text>

  <!-- Interior question marks -->
  <text x="390" y="305" text-anchor="middle" font-family="ui-monospace,monospace" font-size="52" font-weight="bold" fill="#1e293b">?</text>
  <text x="450" y="285" text-anchor="middle" font-family="ui-monospace,monospace" font-size="36" font-weight="bold" fill="#1a0509">?</text>
  <text x="510" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="44" font-weight="bold" fill="#1e293b">?</text>
  <text x="560" y="275" text-anchor="middle" font-family="ui-monospace,monospace" font-size="30" font-weight="bold" fill="#1a0509">?</text>

  <!-- Lock icon in center -->
  <rect x="427" y="248" width="46" height="38" rx="5" fill="#1e0205" stroke="#f43f5e" stroke-width="1.5"/>
  <path d="M435 248 Q435 228 450 228 Q465 228 465 248" fill="none" stroke="#f43f5e" stroke-width="2"/>
  <circle cx="450" cy="265" r="6" fill="#f43f5e" opacity="0.8"/>
  <line x1="450" y1="271" x2="450" y2="279" stroke="#f43f5e" stroke-width="2"/>

  <!-- Output arrows -->
  <line x1="590" y1="245" x2="720" y2="205" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="590" y1="270" x2="720" y2="270" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="590" y1="295" x2="720" y2="335" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <polygon points="716,202 724,206 718,213" fill="#f59e0b" opacity="0.6"/>
  <polygon points="716,265 724,270 716,276" fill="#f59e0b" opacity="0.6"/>
  <polygon points="716,330 724,336 718,343" fill="#f59e0b" opacity="0.6"/>

  <!-- Output labels (right) -->
  <text x="728" y="209" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">predict: 1</text>
  <text x="728" y="274" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">score: 0.87</text>
  <text x="728" y="339" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">label: "fraud"</text>

  <!-- Warning banner -->
  <rect x="140" y="390" width="740" height="46" rx="8" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="510" y="408" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">⚠  if you can't explain the model, you can't trust the output</text>
  <text x="510" y="426" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">understand every transformation — from raw input to final prediction</text>
</svg>
