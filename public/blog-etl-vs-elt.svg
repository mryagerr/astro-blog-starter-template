<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="22" font-weight="bold" fill="#e2e8f0">Which Pipeline Pattern</text>
  <text x="510" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="40" font-weight="bold" fill="#38bdf8">ETL vs ELT</text>

  <!-- ETL Side Label -->
  <text x="255" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="bold" fill="#f59e0b">ETL</text>

  <!-- ETL: Extract box -->
  <rect x="30" y="170" width="130" height="90" rx="10" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <text x="95" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">EXTRACT</text>
  <text x="95" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">raw source</text>

  <!-- Arrow ETL 1 -->
  <line x1="163" y1="215" x2="198" y2="215" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="192,209 207,215 192,221" fill="#f59e0b"/>

  <!-- ETL: Transform box -->
  <rect x="210" y="170" width="130" height="90" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="2"/>
  <text x="275" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f59e0b">TRANSFORM</text>
  <text x="275" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">clean first</text>

  <!-- Arrow ETL 2 -->
  <line x1="343" y1="215" x2="378" y2="215" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="372,209 387,215 372,221" fill="#22c55e"/>

  <!-- ETL: Load box -->
  <rect x="390" y="170" width="130" height="90" rx="10" fill="#001a0a" stroke="#22c55e" stroke-width="2"/>
  <text x="455" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">LOAD</text>
  <text x="455" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">structured data</text>

  <!-- ETL cost badge -->
  <rect x="160" y="282" width="210" height="28" rx="6" fill="#1e293b"/>
  <text x="265" y="301" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">⚙ transform before storage</text>

  <!-- Divider -->
  <line x1="555" y1="145" x2="555" y2="420" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="555" y="140" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">vs</text>

  <!-- ELT Side Label -->
  <text x="775" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="bold" fill="#a78bfa">ELT</text>

  <!-- ELT: Extract box -->
  <rect x="575" y="170" width="130" height="90" rx="10" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <text x="640" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">EXTRACT</text>
  <text x="640" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">raw source</text>

  <!-- Arrow ELT 1 -->
  <line x1="708" y1="215" x2="743" y2="215" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="737,209 752,215 737,221" fill="#22c55e"/>

  <!-- ELT: Load box -->
  <rect x="755" y="170" width="130" height="90" rx="10" fill="#001a0a" stroke="#22c55e" stroke-width="2"/>
  <text x="820" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">LOAD</text>
  <text x="820" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">raw into warehouse</text>

  <!-- Arrow ELT 2 (down then back) -->
  <line x1="820" y1="262" x2="820" y2="295" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="820" y1="295" x2="640" y2="295" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="640" y1="295" x2="640" y2="330" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="634,325 640,342 646,325" fill="#a78bfa"/>

  <!-- ELT: Transform box (inside warehouse) -->
  <rect x="575" y="342" width="490" height="62" rx="10" fill="#1a0a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="820" y="370" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#a78bfa">TRANSFORM  (inside the warehouse)</text>
  <text x="820" y="390" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">SQL / dbt — runs on warehouse compute</text>

  <!-- ELT cost badge -->
  <rect x="610" y="282" width="215" height="28" rx="6" fill="#1e293b"/>
  <text x="717" y="301" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">☁ load raw, transform later</text>

  <!-- Comparison footer -->
  <rect x="30" y="430" width="450" height="52" rx="8" fill="#0c1a0c" stroke="#22c55e" stroke-width="1"/>
  <text x="255" y="452" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">ETL  ·  lower cost  ·  more setup work</text>
  <text x="255" y="472" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">transform engine lives outside the warehouse</text>

  <rect x="540" y="430" width="450" height="52" rx="8" fill="#0f0a1e" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="452" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#a78bfa">ELT  ·  easier to start  ·  warehouse costs scale</text>
  <text x="765" y="472" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">warehouse does the heavy lifting</text>
</svg>
