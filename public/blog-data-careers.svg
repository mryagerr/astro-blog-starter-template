<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="55" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">Data Careers Are Not</text>
  <text x="510" y="93" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="bold" fill="#38bdf8">Pokemon Evolutions</text>

  <!-- Connection lines (drawn behind nodes) -->
  <line x1="150" y1="265" x2="390" y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="150" y1="265" x2="390" y2="365" stroke="#334155" stroke-width="1.5"/>
  <line x1="390" y1="165" x2="650" y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="390" y1="165" x2="390" y2="365" stroke="#334155" stroke-width="1.5"/>
  <line x1="390" y1="165" x2="650" y2="365" stroke="#334155" stroke-width="1.5"/>
  <line x1="390" y1="365" x2="650" y2="365" stroke="#334155" stroke-width="1.5"/>
  <line x1="390" y1="365" x2="650" y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="650" y1="165" x2="880" y2="265" stroke="#334155" stroke-width="1.5"/>
  <line x1="650" y1="365" x2="880" y2="265" stroke="#334155" stroke-width="1.5"/>

  <!-- Node: Data Analyst -->
  <rect x="60" y="241" width="180" height="48" rx="10" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <text x="150" y="271" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">Data Analyst</text>

  <!-- Node: Data Engineer -->
  <rect x="300" y="141" width="180" height="48" rx="10" fill="#071a2e" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="171" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">Data Engineer</text>

  <!-- Node: Data Scientist -->
  <rect x="300" y="341" width="180" height="48" rx="10" fill="#071a2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="390" y="371" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f59e0b">Data Scientist</text>

  <!-- Node: ML Engineer -->
  <rect x="560" y="141" width="180" height="48" rx="10" fill="#071a2e" stroke="#f43f5e" stroke-width="2"/>
  <text x="650" y="171" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f43f5e">ML Engineer</text>

  <!-- Node: Analytics Engineer -->
  <rect x="560" y="341" width="180" height="48" rx="10" fill="#071a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="650" y="371" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#a78bfa">Analytics Eng</text>

  <!-- Node: Data Architect -->
  <rect x="790" y="241" width="180" height="48" rx="10" fill="#071a2e" stroke="#94a3b8" stroke-width="2"/>
  <text x="880" y="271" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#94a3b8">Data Architect</text>

  <!-- Tagline -->
  <text x="510" y="455" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">every path is valid — pick the one that fits your curiosity</text>
