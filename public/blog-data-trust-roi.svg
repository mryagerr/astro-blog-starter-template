<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="46" text-anchor="middle" font-family="ui-monospace,monospace" font-size="22" font-weight="bold" fill="#e2e8f0">Trust and Time Are the Real Currencies</text>
  <text x="510" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#38bdf8">of Data ROI</text>

  <!-- Left panel: Trust funnel -->
  <rect x="45" y="110" width="280" height="310" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="185" y="136" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">Trust Account</text>

  <!-- Trust deposits -->
  <rect x="65" y="152" width="240" height="26" rx="4" fill="#0a2a10" stroke="#22c55e" stroke-width="1"/>
  <text x="185" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">+ accurate report delivered</text>

  <rect x="65" y="184" width="240" height="26" rx="4" fill="#0a2a10" stroke="#22c55e" stroke-width="1"/>
  <text x="185" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">+ numbers match reality</text>

  <rect x="65" y="216" width="240" height="26" rx="4" fill="#0a2a10" stroke="#22c55e" stroke-width="1"/>
  <text x="185" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">+ quick win builds confidence</text>

  <!-- Trust withdrawal -->
  <line x1="65" y1="256" x2="305" y2="256" stroke="#334155" stroke-width="1"/>
  <rect x="65" y="268" width="240" height="26" rx="4" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="185" y="286" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">- ONE bad dataset found</text>

  <rect x="65" y="300" width="240" height="26" rx="4" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="185" y="318" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">- trust wiped instantly</text>

  <rect x="65" y="332" width="240" height="26" rx="4" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="185" y="350" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">- all past work questioned</text>

  <text x="185" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">trust is slow to build, fast to lose</text>

  <!-- Center: Time waste cycle -->
  <rect x="365" y="110" width="280" height="310" rx="10" fill="#071828" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="505" y="136" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f59e0b">Time Wasted</text>

  <!-- Cycle of waste -->
  <rect x="385" y="152" width="240" height="26" rx="4" fill="#1a1000" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="505" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">bad data enters pipeline</text>

  <text x="505" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#475569">v</text>

  <rect x="385" y="198" width="240" height="26" rx="4" fill="#1a1000" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="505" y="216" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">analysis built on bad data</text>

  <text x="505" y="238" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#475569">v</text>

  <rect x="385" y="244" width="240" height="26" rx="4" fill="#1a1000" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="505" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">decisions made on bad analysis</text>

  <text x="505" y="284" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#475569">v</text>

  <rect x="385" y="290" width="240" height="26" rx="4" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="505" y="308" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">error discovered late</text>

  <text x="505" y="330" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#475569">v</text>

  <rect x="385" y="336" width="240" height="26" rx="4" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="505" y="354" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">rework everything upstream</text>

  <text x="505" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">every hour on bad data is negative ROI</text>

  <!-- Right panel: ROI path -->
  <rect x="685" y="110" width="290" height="310" rx="10" fill="#071828" stroke="#22c55e" stroke-width="1.5"/>
  <text x="830" y="136" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">Path to ROI</text>

  <rect x="705" y="155" width="250" height="36" rx="5" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="830" y="172" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">1. validate data quality first</text>
  <text x="830" y="185" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">earn trust through accuracy</text>

  <text x="830" y="205" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#22c55e">v</text>

  <rect x="705" y="212" width="250" height="36" rx="5" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="830" y="229" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">2. reduce time-to-insight</text>
  <text x="830" y="242" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">eliminate wasted cycles</text>

  <text x="830" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#22c55e">v</text>

  <rect x="705" y="269" width="250" height="36" rx="5" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="830" y="286" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">3. start with low hanging fruit</text>
  <text x="830" y="299" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">small wins compound into ROI</text>

  <text x="830" y="319" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#22c55e">v</text>

  <rect x="705" y="326" width="250" height="36" rx="5" fill="#0a2a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="830" y="343" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">4. trusted data = real ROI</text>
  <text x="830" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">decisions backed by confidence</text>

  <text x="830" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">trust + time savings = return</text>

  <!-- Bottom tagline -->
  <text x="510" y="455" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#334155">incorrect data doesn't just waste time — it destroys the trust that makes ROI possible</text>
  <text x="510" y="478" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">low hanging fruit: earn trust first, then build toward return</text>
</svg>
