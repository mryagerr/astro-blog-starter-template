<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Working with</text>
  <text x="510" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="32" font-weight="bold" fill="#38bdf8">Parquet and DuckDB</text>

  <!-- Left: Row-based storage (CSV/traditional) -->
  <text x="215" y="125" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f59e0b">Row-based (CSV)</text>

  <!-- Row storage grid: each row is a full record -->
  <!-- Row 1 -->
  <rect x="60" y="135" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <rect x="134" y="135" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <rect x="208" y="135" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <rect x="282" y="135" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="95" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">AAPL</text>
  <text x="169" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">189.42</text>
  <text x="243" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">48M</text>
  <text x="317" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">2024-01</text>
  <!-- Row 2 -->
  <rect x="60" y="167" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <rect x="134" y="167" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <rect x="208" y="167" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <rect x="282" y="167" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="95" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">TSLA</text>
  <text x="169" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">245.10</text>
  <text x="243" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">30M</text>
  <text x="317" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">2024-01</text>
  <!-- Row 3 -->
  <rect x="60" y="199" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="134" y="199" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="208" y="199" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="282" y="199" width="70" height="28" rx="2" fill="#1a1200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <text x="95" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">MSFT</text>
  <text x="169" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">410.22</text>
  <text x="243" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">22M</text>
  <text x="317" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">2024-01</text>

  <!-- Column header labels -->
  <text x="95" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">ticker</text>
  <text x="169" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">price</text>
  <text x="243" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">volume</text>
  <text x="317" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">date</text>

  <!-- Query annotation: must read ALL columns -->
  <rect x="55" y="240" width="300" height="50" rx="6" fill="#0d1117" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">SELECT AVG(price) …</text>
  <text x="205" y="276" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">reads every row in full → slow</text>

  <!-- Center arrow -->
  <line x1="365" y1="265" x2="460" y2="265" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="453,257 466,265 453,273" fill="#38bdf8"/>
  <text x="410" y="256" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">vs</text>

  <!-- Right: Columnar (Parquet) -->
  <text x="730" y="125" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">Columnar (Parquet)</text>

  <!-- Columnar storage: each column is stored together -->
  <!-- ticker column -->
  <rect x="490" y="135" width="70" height="28" rx="2" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="490" y="167" width="70" height="28" rx="2" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="490" y="199" width="70" height="28" rx="2" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="525" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">ticker</text>
  <text x="525" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">AAPL</text>
  <text x="525" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">TSLA</text>
  <text x="525" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">MSFT</text>

  <!-- price column — highlighted (only one needed) -->
  <rect x="564" y="135" width="70" height="28" rx="2" fill="#0a2a10" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="564" y="167" width="70" height="28" rx="2" fill="#0a2a10" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="564" y="199" width="70" height="28" rx="2" fill="#0a2a10" stroke="#22c55e" stroke-width="2.5"/>
  <text x="599" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">price ✓</text>
  <text x="599" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">189.42</text>
  <text x="599" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">245.10</text>
  <text x="599" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">410.22</text>

  <!-- volume column — skipped -->
  <rect x="638" y="135" width="70" height="28" rx="2" fill="#071828" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <rect x="638" y="167" width="70" height="28" rx="2" fill="#071828" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <rect x="638" y="199" width="70" height="28" rx="2" fill="#071828" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <text x="673" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">volume</text>
  <text x="673" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">48M</text>
  <text x="673" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">30M</text>
  <text x="673" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">22M</text>

  <!-- date column — skipped -->
  <rect x="712" y="135" width="70" height="28" rx="2" fill="#071828" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <rect x="712" y="167" width="70" height="28" rx="2" fill="#071828" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <rect x="712" y="199" width="70" height="28" rx="2" fill="#071828" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <text x="747" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">date</text>
  <text x="747" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">2024-01</text>
  <text x="747" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">2024-01</text>
  <text x="747" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">2024-01</text>

  <!-- Query: only reads price column -->
  <rect x="490" y="240" width="300" height="50" rx="6" fill="#071828" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">SELECT AVG(price) …</text>
  <text x="640" y="276" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">reads only price column → fast</text>

  <!-- Performance bar comparison -->
  <rect x="55" y="320" width="910" height="130" rx="10" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="510" y="345" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#e2e8f0">Performance on 10M rows</text>
  <!-- CSV bar -->
  <text x="140" y="372" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">CSV / row</text>
  <rect x="200" y="360" width="550" height="20" rx="3" fill="#1a1200" stroke="#f59e0b" stroke-width="1"/>
  <rect x="200" y="360" width="550" height="20" rx="3" fill="#f59e0b" opacity="0.6"/>
  <text x="760" y="375" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">~18s</text>
  <!-- Parquet bar -->
  <text x="140" y="406" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">Parquet + DuckDB</text>
  <rect x="200" y="394" width="550" height="20" rx="3" fill="#071828" stroke="#22c55e" stroke-width="1"/>
  <rect x="200" y="394" width="90" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="300" y="409" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">~0.3s</text>

  <text x="510" y="440" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#334155">columnar format skips irrelevant columns entirely — orders of magnitude faster</text>
</svg>
