<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Background grid lines (subtle) -->
  <line x1="0" y1="170" x2="1020" y2="170" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="0" y1="340" x2="1020" y2="340" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="255" y1="0" x2="255" y2="510" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="510" y1="0" x2="510" y2="510" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="765" y1="0" x2="765" y2="510" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Title -->
  <text x="510" y="48" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Trust the Data? Ask the People Who Live In It.</text>
  <text x="510" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#64748b">Ivory Castle vs. The Gemba</text>

  <!-- LEFT SIDE: Ivory Castle (analyst isolated) -->
  <!-- Castle tower shape -->
  <rect x="60" y="160" width="340" height="220" rx="6" fill="#071828" stroke="#334155" stroke-width="2"/>

  <!-- Battlements on top of castle -->
  <rect x="60" y="140" width="50" height="30" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="2"/>
  <rect x="125" y="140" width="50" height="30" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="2"/>
  <rect x="190" y="140" width="50" height="30" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="2"/>
  <rect x="255" y="140" width="50" height="30" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="2"/>
  <rect x="320" y="140" width="50" height="30" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="2"/>
  <rect x="60" y="158" width="340" height="4" fill="#0d1f30"/>

  <!-- Castle label -->
  <text x="230" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">IVORY CASTLE</text>

  <!-- Analyst at desk inside castle -->
  <rect x="140" y="200" width="180" height="110" rx="6" fill="#0a1929" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="230" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">analyst_dashboard.sql</text>

  <!-- "Perfect" data table in castle -->
  <rect x="155" y="228" width="150" height="70" rx="3" fill="#071828" stroke="#1e3a5f" stroke-width="1"/>
  <text x="165" y="243" font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8">id  | status  | amount</text>
  <line x1="155" y1="248" x2="305" y2="248" stroke="#1e3a5f" stroke-width="1"/>
  <text x="165" y="260" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">001 | active  | 1200.00</text>
  <text x="165" y="272" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">002 | active  | 875.00</text>
  <text x="165" y="284" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">003 | active  | 2100.00</text>

  <!-- Green checkmark - looks perfect -->
  <circle cx="310" cy="245" r="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="310" y="250" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">✓</text>

  <!-- "Looks clean!" label -->
  <text x="230" y="318" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">✓ No nulls  ✓ No dupes  ✓ Joins OK</text>

  <!-- Analyst figure (isolated, smiling) -->
  <circle cx="230" cy="355" r="14" fill="#0d1f30" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="351" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">:)</text>
  <line x1="230" y1="369" x2="230" y2="395" stroke="#334155" stroke-width="2"/>
  <line x1="230" y1="378" x2="215" y2="388" stroke="#334155" stroke-width="2"/>
  <line x1="230" y1="378" x2="245" y2="388" stroke="#334155" stroke-width="2"/>
  <text x="230" y="420" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">isolated analyst</text>
  <text x="230" y="433" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">"data looks great!"</text>

  <!-- Moat / barrier at base of castle -->
  <ellipse cx="230" cy="468" rx="180" ry="14" fill="#071020" stroke="#1e293b" stroke-width="1"/>
  <text x="230" y="472" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#1e3a5f">~ ~ ~ moat: no SME contact ~ ~ ~</text>

  <!-- CENTER: Arrow / divider with label -->
  <text x="510" y="280" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" fill="#f59e0b">⟶</text>
  <text x="510" y="305" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#f59e0b">go to the</text>
  <text x="510" y="319" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#f59e0b">GEMBA</text>

  <!-- RIGHT SIDE: The Gemba -->
  <rect x="620" y="130" width="360" height="290" rx="8" fill="#071828" stroke="#0891b2" stroke-width="2"/>
  <text x="800" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" font-weight="bold" fill="#0891b2">THE GEMBA — where the work happens</text>

  <!-- SME figure -->
  <circle cx="680" cy="195" r="14" fill="#0d1f30" stroke="#0891b2" stroke-width="1.5"/>
  <text x="680" y="191" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">:O</text>
  <line x1="680" y1="209" x2="680" y2="235" stroke="#0891b2" stroke-width="2"/>
  <line x1="680" y1="218" x2="665" y2="228" stroke="#0891b2" stroke-width="2"/>
  <line x1="680" y1="218" x2="695" y2="228" stroke="#0891b2" stroke-width="2"/>
  <text x="680" y="252" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0891b2">SME</text>

  <!-- Speech bubble from SME -->
  <rect x="700" y="162" width="265" height="86" rx="8" fill="#0c1e30" stroke="#0891b2" stroke-width="1.5"/>
  <polygon points="700,195 686,195 700,205" fill="#0c1e30" stroke="#0891b2" stroke-width="1"/>
  <text x="714" y="182" font-family="ui-monospace,monospace" font-size="9" fill="#e2e8f0">"status='active' just means</text>
  <text x="714" y="196" font-family="ui-monospace,monospace" font-size="9" fill="#e2e8f0"> the record wasn't deleted.</text>
  <text x="714" y="210" font-family="ui-monospace,monospace" font-size="9" fill="#f87171"> Half those accounts haven't</text>
  <text x="714" y="224" font-family="ui-monospace,monospace" font-size="9" fill="#f87171"> transacted in 3 years."</text>
  <text x="714" y="240" font-family="ui-monospace,monospace" font-size="9" fill="#f59e0b">  — warehouse ops manager</text>

  <!-- Gap discovered: annotated data -->
  <rect x="635" y="270" width="330" height="118" rx="6" fill="#0a1929" stroke="#f87171" stroke-width="1.5"/>
  <text x="645" y="288" font-family="ui-monospace,monospace" font-size="9" font-weight="bold" fill="#f87171">⚠ GAPS DISCOVERED</text>
  <line x1="635" y1="293" x2="965" y2="293" stroke="#1e293b" stroke-width="1"/>

  <text x="645" y="307" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">id  | status  | amount  | last_txn</text>
  <line x1="635" y1="312" x2="965" y2="312" stroke="#1e293b" stroke-width="1"/>
  <text x="645" y="324" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">001 | active  | 1200.00 | 2023-01-04</text>
  <text x="645" y="336" font-family="ui-monospace,monospace" font-size="8" fill="#f87171">002 | active  | 875.00  | 2021-08-12 ← DORMANT</text>
  <text x="645" y="348" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">003 | active  | 2100.00 | 2025-11-30</text>
  <text x="645" y="360" font-family="ui-monospace,monospace" font-size="8" fill="#f59e0b">004 | active  | 0.00    | NULL      ← TEST ACCT</text>
  <text x="645" y="372" font-family="ui-monospace,monospace" font-size="8" fill="#f87171">005 | active  | 450.00  | 2020-03-18 ← DORMANT</text>

  <!-- Analyst + SME together at gemba -->
  <circle cx="730" cy="425" r="14" fill="#0d1f30" stroke="#0891b2" stroke-width="1.5"/>
  <text x="730" y="421" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">:|</text>
  <line x1="730" y1="439" x2="730" y2="460" stroke="#0891b2" stroke-width="2"/>

  <circle cx="790" cy="425" r="14" fill="#0d1f30" stroke="#22c55e" stroke-width="1.5"/>
  <text x="790" y="421" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">:D</text>
  <line x1="790" y1="439" x2="790" y2="460" stroke="#22c55e" stroke-width="2"/>

  <text x="760" y="478" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#0891b2">analyst + SME = real data quality</text>

  <!-- Paranoia badge top right -->
  <rect x="830" y="440" width="148" height="40" rx="6" fill="#1c0a00" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="904" y="455" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="bold" fill="#f59e0b">paranoia is productive</text>
  <text x="904" y="470" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#f59e0b">ask "what does this field mean?"</text>
</svg>
