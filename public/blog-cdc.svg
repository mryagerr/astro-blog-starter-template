<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Change Data Capture</text>
  <text x="510" y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#38bdf8">Requires an ROI to Be Taken Seriously</text>

  <!-- Source DB (left) -->
  <rect x="55" y="120" width="200" height="240" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <text x="155" y="144" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">Source DB</text>
  <!-- Table rows -->
  <rect x="72" y="155" width="166" height="22" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="0.5"/>
  <text x="155" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">id · name · status</text>

  <rect x="72" y="180" width="166" height="22" rx="3" fill="#071828" stroke="#334155" stroke-width="0.5"/>
  <text x="155" y="195" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">1 · Alice · active</text>

  <rect x="72" y="205" width="166" height="22" rx="3" fill="#0a2a10" stroke="#22c55e" stroke-width="0.8"/>
  <text x="155" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">2 · Bob · active ← new</text>

  <rect x="72" y="230" width="166" height="22" rx="3" fill="#1a1000" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="155" y="245" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">3 · Carol · paused ← upd</text>

  <rect x="72" y="255" width="166" height="22" rx="3" fill="#1a0509" stroke="#f43f5e" stroke-width="0.8"/>
  <text x="155" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f43f5e">4 · Dave · —  ← del</text>

  <rect x="72" y="280" width="166" height="22" rx="3" fill="#071828" stroke="#334155" stroke-width="0.5"/>
  <text x="155" y="295" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">5 · Eve · active</text>

  <text x="155" y="340" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">WAL / binlog</text>

  <!-- CDC Stream (center) -->
  <rect x="295" y="145" width="240" height="210" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="415" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">CDC Event Stream</text>
  <!-- Events -->
  <rect x="310" y="178" width="210" height="28" rx="5" fill="#0a2a10" stroke="#22c55e" stroke-width="1"/>
  <text x="415" y="197" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">INSERT · id=2 · Bob</text>

  <rect x="310" y="212" width="210" height="28" rx="5" fill="#1a1000" stroke="#f59e0b" stroke-width="1"/>
  <text x="415" y="231" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">UPDATE · id=3 · paused</text>

  <rect x="310" y="246" width="210" height="28" rx="5" fill="#1a0509" stroke="#f43f5e" stroke-width="1"/>
  <text x="415" y="265" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">DELETE · id=4</text>

  <rect x="310" y="280" width="210" height="28" rx="5" fill="#071828" stroke="#334155" stroke-width="1"/>
  <text x="415" y="299" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">INSERT · id=6 · Frank</text>

  <!-- Connector arrows -->
  <line x1="255" y1="220" x2="292" y2="220" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="286,213 296,220 286,227" fill="#38bdf8"/>

  <line x1="538" y1="255" x2="575" y2="255" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="569,248 580,255 569,262" fill="#38bdf8"/>

  <!-- Target (right) -->
  <rect x="580" y="120" width="200" height="240" rx="10" fill="#071828" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="144" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#22c55e">Target / DW</text>
  <rect x="597" y="155" width="166" height="22" rx="3" fill="#0d1f30" stroke="#334155" stroke-width="0.5"/>
  <text x="680" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">id · name · status</text>
  <rect x="597" y="180" width="166" height="22" rx="3" fill="#071828" stroke="#334155" stroke-width="0.5"/>
  <text x="680" y="195" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">1 · Alice · active</text>
  <rect x="597" y="205" width="166" height="22" rx="3" fill="#0a2a10" stroke="#22c55e" stroke-width="0.8"/>
  <text x="680" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">2 · Bob · active</text>
  <rect x="597" y="230" width="166" height="22" rx="3" fill="#1a1000" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="680" y="245" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">3 · Carol · paused</text>
  <rect x="597" y="255" width="166" height="22" rx="3" fill="#071828" stroke="#334155" stroke-width="0.5"/>
  <text x="680" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">5 · Eve · active</text>
  <rect x="597" y="280" width="166" height="22" rx="3" fill="#0a2a10" stroke="#22c55e" stroke-width="0.8"/>
  <text x="680" y="295" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">6 · Frank · active</text>

  <!-- ROI callout (right side) -->
  <rect x="800" y="130" width="175" height="215" rx="10" fill="#0d1f30" stroke="#38bdf8" stroke-width="1"/>
  <text x="888" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#e2e8f0">CDC Costs</text>
  <text x="818" y="173" font-family="ui-monospace,monospace" font-size="10" fill="#f43f5e">• complex setup</text>
  <text x="818" y="190" font-family="ui-monospace,monospace" font-size="10" fill="#f43f5e">• infra overhead</text>
  <text x="818" y="207" font-family="ui-monospace,monospace" font-size="10" fill="#f43f5e">• ops burden</text>
  <line x1="815" y1="218" x2="963" y2="218" stroke="#334155" stroke-width="1"/>
  <text x="888" y="235" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#e2e8f0">CDC Value</text>
  <text x="818" y="254" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">• real-time sync</text>
  <text x="818" y="271" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">• zero downtime</text>
  <text x="818" y="288" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">• audit trail</text>
  <text x="818" y="305" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">• incremental loads</text>
  <text x="818" y="330" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">ROI must be clear</text>

  <!-- Bottom tagline -->
  <text x="510" y="418" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">CDC is powerful — but justify the complexity before committing to it</text>
  <text x="510" y="438" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#334155">low hanging fruit: scheduled batch loads first, CDC only when latency truly matters</text>
</svg>
