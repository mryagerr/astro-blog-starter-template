<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Low-Hanging Data Sources for</text>
  <text x="510" y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#38bdf8">Stock Market Prediction</text>

  <!-- Data source nodes (left) -->
  <rect x="40" y="135" width="185" height="40" rx="8" fill="#071a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="132" y="160" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">📈 Price &amp; Volume History</text>

  <rect x="40" y="192" width="185" height="40" rx="8" fill="#071a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="132" y="217" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">📄 SEC Filings (EDGAR)</text>

  <rect x="40" y="249" width="185" height="40" rx="8" fill="#071a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="274" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">📰 News Sentiment</text>

  <rect x="40" y="306" width="185" height="40" rx="8" fill="#071a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="132" y="331" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#a78bfa">💬 Social / Reddit / X</text>

  <rect x="40" y="363" width="185" height="40" rx="8" fill="#071a2e" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="132" y="388" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">🏦 Macro Indicators</text>

  <!-- Arrows to model -->
  <line x1="225" y1="155" x2="370" y2="270" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="225" y1="212" x2="370" y2="270" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="225" y1="269" x2="370" y2="270" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="225" y1="326" x2="370" y2="270" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="225" y1="383" x2="370" y2="270" stroke="#f43f5e" stroke-width="1.5" opacity="0.5"/>

  <!-- Feature aggregation box -->
  <rect x="370" y="230" width="140" height="80" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="440" y="263" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">Feature</text>
  <text x="440" y="281" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">Engineering</text>
  <text x="440" y="299" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">[ normalize · lag · diff ]</text>

  <!-- Arrow to prediction output -->
  <line x1="510" y1="270" x2="570" y2="270" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="565,263 578,270 565,277" fill="#38bdf8"/>

  <!-- Prediction output: stock chart -->
  <rect x="578" y="130" width="380" height="280" rx="10" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Chart grid lines -->
  <line x1="598" y1="175" x2="938" y2="175" stroke="#1e293b" stroke-width="1"/>
  <line x1="598" y1="220" x2="938" y2="220" stroke="#1e293b" stroke-width="1"/>
  <line x1="598" y1="265" x2="938" y2="265" stroke="#1e293b" stroke-width="1"/>
  <line x1="598" y1="310" x2="938" y2="310" stroke="#1e293b" stroke-width="1"/>
  <line x1="598" y1="355" x2="938" y2="355" stroke="#1e293b" stroke-width="1"/>
  <!-- Price line -->
  <polyline points="608,340 648,320 688,330 728,290 768,305 808,260 848,270 888,240 928,215" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <!-- Prediction zone (shaded) -->
  <polygon points="888,240 928,215 928,195 888,220" fill="#22c55e" opacity="0.15"/>
  <polyline points="888,240 928,195" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Prediction label -->
  <text x="895" y="188" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">predicted ↑</text>
  <!-- Chart title -->
  <text x="758" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#e2e8f0">model output</text>
  <!-- Baseline -->
  <line x1="598" y1="370" x2="938" y2="370" stroke="#334155" stroke-width="1.5"/>

  <!-- Bottom tagline -->
  <text x="510" y="462" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">start with freely available signals before investing in proprietary data</text>
</svg>
