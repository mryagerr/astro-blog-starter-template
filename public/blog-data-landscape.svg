<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">The Data Landscape Has Expanded —</text>
  <text x="510" y="88" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="bold" fill="#38bdf8">And So Has Its Audience</text>

  <!-- Central data hub -->
  <circle cx="510" cy="300" r="52" fill="#071828" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="510" y="295" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">DATA</text>
  <text x="510" y="313" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">PLATFORM</text>

  <!-- Spokes to stakeholders -->
  <!-- Engineer (top-left) -->
  <line x1="472" y1="260" x2="320" y2="175" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="215" y="130" width="150" height="54" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="290" y="155" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">Data Engineer</text>
  <text x="290" y="173" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">builds pipelines</text>

  <!-- Analyst (top-center) -->
  <line x1="510" y1="248" x2="510" y2="195" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="424" y="143" width="172" height="54" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f59e0b">Data Analyst</text>
  <text x="510" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">explores &amp; reports</text>

  <!-- Scientist (top-right) -->
  <line x1="548" y1="260" x2="700" y2="175" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="655" y="130" width="155" height="54" rx="10" fill="#130e2a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="733" y="155" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#a78bfa">Data Scientist</text>
  <text x="733" y="173" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">models &amp; predicts</text>

  <!-- Business stakeholder (bottom-left) -->
  <line x1="465" y1="338" x2="290" y2="400" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="155" y="378" width="182" height="54" rx="10" fill="#0d1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="246" y="400" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#22c55e">Business Leader</text>
  <text x="246" y="418" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">drives decisions</text>

  <!-- Product (bottom-right) -->
  <line x1="555" y1="338" x2="730" y2="400" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="683" y="378" width="182" height="54" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="774" y="400" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f43f5e">Product Manager</text>
  <text x="774" y="418" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">shapes features</text>

  <!-- Tagline -->
  <text x="510" y="476" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">one platform · many stakeholders · shared context</text>
</svg>
