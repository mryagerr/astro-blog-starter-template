<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#0f172a"/>

  <!-- Apple body -->
  <ellipse cx="90" cy="118" rx="52" ry="47" fill="#22c55e"/>

  <!-- Apple top indent -->
  <ellipse cx="90" cy="73" rx="13" ry="7" fill="#0f172a"/>

  <!-- Stem -->
  <line x1="93" y1="70" x2="100" y2="44"
        stroke="#92400e" stroke-width="7" stroke-linecap="round"/>

  <!-- Leaf -->
  <ellipse cx="118" cy="42" rx="20" ry="10"
           fill="#16a34a" transform="rotate(-25 118 42)"/>
  <!-- Leaf vein -->
  <line x1="106" y1="48" x2="127" y2="37"
        stroke="#15803d" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Apple highlight -->
  <circle cx="73" cy="104" r="11" fill="#ffffff" opacity="0.18"/>
  <circle cx="68" cy="98" r="5" fill="#ffffff" opacity="0.12"/>

  <!-- Cyan data dot — "Low Hanging Data" nod -->
  <circle cx="126" cy="130" r="12" fill="#38bdf8"/>
  <circle cx="126" cy="130" r="5" fill="#0f172a"/>
</svg>
