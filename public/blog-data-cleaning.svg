<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Data Cleaning</text>
  <text x="510" y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="32" font-weight="bold" fill="#38bdf8">and Validation</text>

  <!-- BEFORE table (left) -->
  <text x="200" y="125" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f43f5e">BEFORE</text>
  <rect x="55" y="133" width="310" height="30" rx="4" fill="#1e293b"/>
  <text x="95" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">id</text>
  <text x="145" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">name</text>
  <text x="245" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">revenue</text>
  <text x="320" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">date</text>

  <!-- Row 1: null value -->
  <rect x="55" y="163" width="310" height="26" rx="0" fill="#0d1f30" stroke="#1e293b" stroke-width="0.5"/>
  <text x="95" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">1</text>
  <text x="145" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">Acme Corp</text>
  <text x="245" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">NULL</text>
  <text x="320" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">2024-01</text>

  <!-- Row 2: bad type -->
  <rect x="55" y="189" width="310" height="26" rx="0" fill="#0d1117" stroke="#1e293b" stroke-width="0.5"/>
  <text x="95" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">2</text>
  <text x="145" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">Beta Inc</text>
  <text x="245" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">"$12k"</text>
  <text x="320" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">01/2024</text>

  <!-- Row 3: duplicate -->
  <rect x="55" y="215" width="310" height="26" rx="0" fill="#0d1f30" stroke="#1e293b" stroke-width="0.5"/>
  <text x="95" y="233" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">3</text>
  <text x="145" y="233" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">BETA INC</text>
  <text x="245" y="233" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">12000</text>
  <text x="320" y="233" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">2024-01</text>

  <!-- Row 4: outlier -->
  <rect x="55" y="241" width="310" height="26" rx="0" fill="#0d1117" stroke="#1e293b" stroke-width="0.5"/>
  <text x="95" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">4</text>
  <text x="145" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">Gamma LLC</text>
  <text x="245" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">-99999</text>
  <text x="320" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">2024-01</text>

  <!-- Issues legend -->
  <rect x="55" y="285" width="310" height="80" rx="6" fill="#0d1117" stroke="#334155" stroke-width="1"/>
  <text x="75" y="304" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">■ NULL values</text>
  <text x="75" y="320" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">■ wrong data types / formats</text>
  <text x="75" y="336" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">■ duplicate / inconsistent records</text>
  <text x="75" y="352" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">■ outliers / impossible values</text>

  <!-- Funnel / transformation arrow -->
  <polygon points="400,175 420,200 400,225" fill="#38bdf8" opacity="0.3"/>
  <polygon points="415,175 435,200 415,225" fill="#38bdf8" opacity="0.5"/>
  <polygon points="430,175 450,200 430,225" fill="#38bdf8" opacity="0.7"/>
  <text x="425" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">clean +</text>
  <text x="425" y="271" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">validate</text>

  <!-- AFTER table (right) -->
  <text x="760" y="125" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">AFTER</text>
  <rect x="595" y="133" width="340" height="30" rx="4" fill="#1e293b"/>
  <text x="635" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">id</text>
  <text x="685" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">name</text>
  <text x="790" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">revenue</text>
  <text x="880" y="153" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">year_month</text>

  <rect x="595" y="163" width="340" height="26" fill="#071828" stroke="#1e293b" stroke-width="0.5"/>
  <text x="635" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">1</text>
  <text x="685" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">Acme Corp</text>
  <text x="790" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">0.00</text>
  <text x="880" y="181" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">2024-01</text>

  <rect x="595" y="189" width="340" height="26" fill="#0d1f30" stroke="#1e293b" stroke-width="0.5"/>
  <text x="635" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">2</text>
  <text x="685" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">Beta Inc</text>
  <text x="790" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">12000.00</text>
  <text x="880" y="207" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">2024-01</text>

  <!-- Row 3 removed (duplicate) with strikethrough zone -->
  <rect x="595" y="215" width="340" height="26" fill="#0a1208" stroke="#1e293b" stroke-width="0.5"/>
  <text x="760" y="233" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#334155">— duplicate removed —</text>

  <rect x="595" y="241" width="340" height="26" fill="#071828" stroke="#1e293b" stroke-width="0.5"/>
  <text x="635" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">4</text>
  <text x="685" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">Gamma LLC</text>
  <text x="790" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#334155">— flagged —</text>
  <text x="880" y="259" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">2024-01</text>

  <!-- Validation checks -->
  <rect x="595" y="285" width="340" height="80" rx="6" fill="#071828" stroke="#22c55e" stroke-width="1"/>
  <text x="615" y="304" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">✓ consistent date format (YYYY-MM)</text>
  <text x="615" y="320" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">✓ revenue cast to float64</text>
  <text x="615" y="336" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">✓ deduplication applied</text>
  <text x="615" y="352" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">⚠ outlier row flagged for review</text>

  <!-- Bottom tagline -->
  <text x="510" y="440" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">bad data in, bad analysis out — validation is not optional</text>
</svg>
