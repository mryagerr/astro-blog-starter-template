<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">DuckDB for</text>
  <text x="510" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="32" font-weight="bold" fill="#38bdf8">Financial Data Analysis</text>

  <!-- SQL query panel (left) -->
  <rect x="55" y="115" width="420" height="270" rx="10" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="55" y="115" width="420" height="34" rx="10" fill="#0d1117"/>
  <rect x="55" y="133" width="420" height="16" fill="#0d1117"/>
  <circle cx="78" cy="132" r="6" fill="#f43f5e" opacity="0.8"/>
  <circle cx="98" cy="132" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="118" cy="132" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="265" y="137" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">duckdb — financial_analysis.sql</text>
  <!-- SQL code -->
  <text x="78" y="172" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">SELECT</text>
  <text x="78" y="191" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  date_trunc(</text>
  <text x="78" y="210" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">    'month'</text>
  <text x="78" y="229" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  , trade_date) </text>
  <text x="78" y="248" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">    AS month,</text>
  <text x="78" y="267" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  ticker,</text>
  <text x="78" y="286" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  AVG(close_price) </text>
  <text x="78" y="305" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">    AS avg_close,</text>
  <text x="78" y="324" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  SUM(volume) AS total_vol</text>
  <text x="78" y="343" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">FROM</text>
  <text x="78" y="362" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">  'prices/*.parquet'</text>
  <text x="440" y="362" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">▊</text>

  <!-- Arrow -->
  <line x1="475" y1="255" x2="535" y2="255" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="528,248 540,255 528,262" fill="#38bdf8"/>

  <!-- Candlestick chart (right) -->
  <rect x="545" y="115" width="420" height="270" rx="10" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="755" y="140" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">avg_close by month — AAPL</text>
  <!-- Grid lines -->
  <line x1="565" y1="165" x2="945" y2="165" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="565" y1="200" x2="945" y2="200" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="565" y1="235" x2="945" y2="235" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="565" y1="270" x2="945" y2="270" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="565" y1="305" x2="945" y2="305" stroke="#1e293b" stroke-width="0.8"/>
  <!-- Candlestick bars -->
  <!-- Month 1 (down) -->
  <line x1="597" y1="205" x2="597" y2="285" stroke="#f43f5e" stroke-width="1"/>
  <rect x="585" y="225" width="24" height="40" rx="2" fill="#f43f5e" opacity="0.8"/>
  <!-- Month 2 (up) -->
  <line x1="650" y1="210" x2="650" y2="290" stroke="#22c55e" stroke-width="1"/>
  <rect x="638" y="220" width="24" height="50" rx="2" fill="#22c55e" opacity="0.8"/>
  <!-- Month 3 (up) -->
  <line x1="703" y1="195" x2="703" y2="265" stroke="#22c55e" stroke-width="1"/>
  <rect x="691" y="205" width="24" height="40" rx="2" fill="#22c55e" opacity="0.8"/>
  <!-- Month 4 (down) -->
  <line x1="756" y1="200" x2="756" y2="280" stroke="#f43f5e" stroke-width="1"/>
  <rect x="744" y="215" width="24" height="45" rx="2" fill="#f43f5e" opacity="0.8"/>
  <!-- Month 5 (up) -->
  <line x1="809" y1="175" x2="809" y2="245" stroke="#22c55e" stroke-width="1"/>
  <rect x="797" y="185" width="24" height="38" rx="2" fill="#22c55e" opacity="0.8"/>
  <!-- Month 6 (up) -->
  <line x1="862" y1="165" x2="862" y2="235" stroke="#22c55e" stroke-width="1"/>
  <rect x="850" y="172" width="24" height="40" rx="2" fill="#22c55e" opacity="0.8"/>
  <!-- Month 7 (down) -->
  <line x1="915" y1="170" x2="915" y2="250" stroke="#f43f5e" stroke-width="1"/>
  <rect x="903" y="185" width="24" height="42" rx="2" fill="#f43f5e" opacity="0.8"/>
  <!-- baseline -->
  <line x1="565" y1="340" x2="945" y2="340" stroke="#334155" stroke-width="1.5"/>
  <!-- month labels -->
  <text x="597" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jan</text>
  <text x="650" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Feb</text>
  <text x="703" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Mar</text>
  <text x="756" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Apr</text>
  <text x="809" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">May</text>
  <text x="862" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jun</text>
  <text x="915" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Jul</text>

  <!-- DuckDB badge -->
  <rect x="300" y="410" width="420" height="46" rx="10" fill="#0d1f30" stroke="#38bdf8" stroke-width="1"/>
  <text x="510" y="430" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">DuckDB — in-process analytics engine</text>
  <text x="510" y="447" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">reads Parquet directly · no server · SQL on millions of rows</text>

  <!-- Bottom tagline -->
  <text x="510" y="480" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">Low Hanging Data</text>
</svg>
