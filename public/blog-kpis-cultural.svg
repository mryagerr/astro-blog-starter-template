<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="46" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">KPIs Are a Cultural Change,</text>
  <text x="510" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#38bdf8">Not a Dashboard Project</text>

  <!-- LEFT COLUMN header -->
  <rect x="55" y="100" width="405" height="30" rx="6" fill="#051a10" stroke="#22c55e" stroke-width="2"/>
  <text x="257" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#22c55e">TECHNICAL TRACK  —  ships in week 4</text>

  <!-- Technical items (done) -->
  <text x="75" y="153" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">✓  metrics defined in workshops</text>
  <text x="75" y="179" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">✓  pipeline built and tested</text>
  <text x="75" y="205" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">✓  dashboard deployed</text>
  <text x="75" y="231" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">✓  users trained, docs written</text>
  <text x="75" y="257" font-family="ui-monospace,monospace" font-size="12" fill="#4ade80">✓  weekly report scheduled</text>

  <!-- Six months later -->
  <rect x="55" y="278" width="405" height="24" rx="5" fill="#0d1117" stroke="#334155" stroke-width="1"/>
  <text x="257" y="294" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">— six months later —</text>

  <!-- Failure items -->
  <text x="75" y="326" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">✗  17 charts nobody opens</text>
  <text x="75" y="352" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">✗  KPIs revised when they looked bad</text>
  <text x="75" y="378" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">✗  decisions still made by gut</text>

  <!-- Center divider -->
  <line x1="480" y1="100" x2="480" y2="415" stroke="#1e293b" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- RIGHT COLUMN header -->
  <rect x="500" y="100" width="465" height="30" rx="6" fill="#1a1100" stroke="#f59e0b" stroke-width="2"/>
  <text x="732" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f59e0b">CULTURAL TRACK  —  never ships on its own</text>

  <!-- Cultural items (unchecked) -->
  <text x="520" y="153" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">□  a leader owns each number</text>
  <text x="520" y="179" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">□  meetings reference the metrics</text>
  <text x="520" y="205" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">□  bad numbers aren't explained away</text>
  <text x="520" y="231" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">□  a decision changes because of a number</text>
  <text x="520" y="257" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">□  definitions hold even when inconvenient</text>

  <!-- What's required -->
  <rect x="500" y="278" width="465" height="24" rx="5" fill="#0d1117" stroke="#f59e0b" stroke-width="1"/>
  <text x="732" y="294" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">requires: commitment · ownership · accountability</text>

  <!-- Success indicators -->
  <text x="520" y="326" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">→  the number matters to who owns it</text>
  <text x="520" y="352" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">→  strategy shifts when a KPI moves</text>
  <text x="520" y="378" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">→  data-driven is a behavior, not a tool</text>

  <!-- Bottom callout -->
  <line x1="55" y1="408" x2="965" y2="408" stroke="#1e293b" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="510" y="440" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f0">the dashboard is not the deliverable — the behavioral change is</text>
  <text x="510" y="466" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">KPI adoption fails when it's treated as a technical rollout</text>
</svg>
