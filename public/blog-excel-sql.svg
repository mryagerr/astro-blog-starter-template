<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="55" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Excel to SQL:</text>
  <text x="510" y="95" text-anchor="middle" font-family="ui-monospace,monospace" font-size="36" font-weight="bold" fill="#38bdf8">Low Hanging Fruit</text>

  <!-- Excel spreadsheet (left) -->
  <rect x="55" y="128" width="380" height="295" rx="10" fill="#071828" stroke="#22c55e" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="55" y="128" width="380" height="34" rx="10" fill="#0d2010"/>
  <rect x="55" y="146" width="380" height="16" fill="#0d2010"/>
  <!-- Excel icon dots -->
  <circle cx="79" cy="145" r="6" fill="#f43f5e" opacity="0.7"/>
  <circle cx="99" cy="145" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="119" cy="145" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="245" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">sales_data.xlsx</text>
  <!-- Column headers -->
  <rect x="55" y="162" width="380" height="24" fill="#0d2010"/>
  <text x="90" y="179" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">A</text>
  <text x="178" y="179" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">B</text>
  <text x="268" y="179" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">C</text>
  <text x="358" y="179" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">D</text>
  <!-- Dividers -->
  <line x1="145" y1="162" x2="145" y2="423" stroke="#1e293b" stroke-width="1"/>
  <line x1="235" y1="162" x2="235" y2="423" stroke="#1e293b" stroke-width="1"/>
  <line x1="325" y1="162" x2="325" y2="423" stroke="#1e293b" stroke-width="1"/>
  <!-- Data rows -->
  <text x="65" y="208" font-family="ui-monospace,monospace" font-size="10" fill="#475569">date</text>
  <text x="155" y="208" font-family="ui-monospace,monospace" font-size="10" fill="#475569">product</text>
  <text x="245" y="208" font-family="ui-monospace,monospace" font-size="10" fill="#475569">region</text>
  <text x="335" y="208" font-family="ui-monospace,monospace" font-size="10" fill="#475569">revenue</text>
  <line x1="55" y1="214" x2="435" y2="214" stroke="#1e293b" stroke-width="1"/>
  <text x="65" y="234" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">2024-01-10</text>
  <text x="155" y="234" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">Widget A</text>
  <text x="245" y="234" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">West</text>
  <text x="335" y="234" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">4820</text>
  <line x1="55" y1="240" x2="435" y2="240" stroke="#1e293b" stroke-width="1"/>
  <text x="65" y="260" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">2024-01-11</text>
  <text x="155" y="260" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">Widget B</text>
  <text x="245" y="260" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">East</text>
  <text x="335" y="260" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">3150</text>
  <line x1="55" y1="266" x2="435" y2="266" stroke="#1e293b" stroke-width="1"/>
  <text x="65" y="286" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">2024-01-12</text>
  <text x="155" y="286" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">Widget A</text>
  <text x="245" y="286" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">North</text>
  <text x="335" y="286" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">6240</text>
  <line x1="55" y1="292" x2="435" y2="292" stroke="#1e293b" stroke-width="1"/>
  <text x="65" y="310" font-family="ui-monospace,monospace" font-size="10" fill="#334155">...</text>
  <!-- Formula bar -->
  <rect x="55" y="350" width="380" height="28" rx="5" fill="#0a1a0a" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="70" y="369" font-family="ui-monospace,monospace" font-size="11" fill="#475569">fx</text>
  <text x="95" y="369" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">=SUMIF(C:C,"West",D:D)</text>
  <!-- Limitation label -->
  <rect x="55" y="390" width="380" height="33" rx="6" fill="#1a0010" stroke="#f43f5e" stroke-width="1"/>
  <text x="245" y="411" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">limited to ~1M rows · no versioning</text>

  <!-- Arrow -->
  <text x="510" y="290" text-anchor="middle" font-family="ui-monospace,monospace" font-size="30" fill="#38bdf8">→</text>
  <text x="510" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">migrate</text>

  <!-- SQL (right) -->
  <rect x="585" y="128" width="380" height="295" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="585" y="128" width="380" height="34" rx="10" fill="#071a2e"/>
  <rect x="585" y="146" width="380" height="16" fill="#071a2e"/>
  <circle cx="609" cy="145" r="6" fill="#f43f5e" opacity="0.7"/>
  <circle cx="629" cy="145" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="649" cy="145" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="775" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">sales_data.sql</text>
  <!-- SQL code -->
  <text x="605" y="188" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">CREATE TABLE</text>
  <text x="741" y="188" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> sales (</text>
  <text x="620" y="210" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  date</text>
  <text x="678" y="210" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">  DATE,</text>
  <text x="620" y="230" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  product</text>
  <text x="694" y="230" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">  TEXT,</text>
  <text x="620" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  region</text>
  <text x="686" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">  TEXT,</text>
  <text x="620" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">  revenue</text>
  <text x="700" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">  NUMERIC</text>
  <text x="605" y="292" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">);</text>
  <line x1="605" y1="305" x2="950" y2="305" stroke="#1e293b" stroke-width="1"/>
  <text x="605" y="328" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">SELECT</text>
  <text x="661" y="328" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> region,</text>
  <text x="730" y="328" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b"> SUM</text>
  <text x="763" y="328" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(revenue)</text>
  <text x="605" y="350" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">FROM</text>
  <text x="649" y="350" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> sales</text>
  <text x="700" y="350" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8"> GROUP BY</text>
  <text x="795" y="350" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> region;</text>
  <!-- Advantage label -->
  <rect x="585" y="390" width="380" height="33" rx="6" fill="#0d1f0d" stroke="#22c55e" stroke-width="1"/>
  <text x="775" y="411" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">billions of rows · versioned · queryable</text>

  <!-- Bottom tagline -->
  <text x="510" y="474" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">the switch is easier than you think</text>
</svg>
