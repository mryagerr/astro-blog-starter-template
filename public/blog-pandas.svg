  <text x="80" y="413" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">df.</text>
  <text x="101" y="413" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">info</text>
  <text x="128" y="413" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">()  →  RangeIndex: 500 entries, 0 to 499</text>
  <text x="65" y="436" font-family="ui-monospace,monospace" font-size="11" fill="#475569">$</text>
  <text x="80" y="436" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">df.</text>
  <text x="101" y="436" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">describe</text>
  <text x="156" y="436" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">()  →  count: 500   mean: 76.3   std: 18.9   min: 12.0</text>
</svg>
