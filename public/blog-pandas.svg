  <rect x="41" y="175" width="488" height="36" fill="#38bdf8" opacity="0.04"/>
  <text x="60" y="198" font-family="ui-monospace,monospace" font-size="12" fill="#475569">0</text>
  <text x="110" y="198" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">Alice</text>
  <text x="210" y="198" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">92.4</text>
  <text x="305" y="198" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">A</text>
  <text x="400" y="198" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">True</text>

  <!-- Row 1 -->
  <text x="60" y="234" font-family="ui-monospace,monospace" font-size="12" fill="#475569">1</text>
  <text x="110" y="234" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">Bob</text>
  <text x="210" y="234" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">78.1</text>
  <text x="305" y="234" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">C</text>
  <text x="400" y="234" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">True</text>

  <!-- Row 2 -->
  <rect x="41" y="247" width="488" height="36" fill="#38bdf8" opacity="0.04"/>
  <text x="60" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#475569">2</text>
  <text x="110" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">Carol</text>
  <text x="210" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">85.7</text>
  <text x="305" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">B</text>
  <text x="400" y="270" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">True</text>

  <!-- Row 3 -->
  <text x="60" y="306" font-family="ui-monospace,monospace" font-size="12" fill="#475569">3</text>
  <text x="110" y="306" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">David</text>
  <text x="210" y="306" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">41.0</text>
  <text x="305" y="306" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">F</text>
  <text x="400" y="306" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">False</text>

  <!-- Row 4 -->
  <rect x="41" y="319" width="488" height="36" fill="#38bdf8" opacity="0.04"/>
  <text x="60" y="342" font-family="ui-monospace,monospace" font-size="12" fill="#475569">4</text>
  <text x="110" y="342" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">Eve</text>
  <text x="210" y="342" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">88.3</text>
  <text x="305" y="342" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">B</text>
  <text x="400" y="342" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">True</text>

  <text x="60" y="374" font-family="ui-monospace,monospace" font-size="12" fill="#334155">...</text>

  <!-- RIGHT: Code block + bar chart -->
  <rect x="550" y="118" width="430" height="260" rx="12" fill="#0d1a00" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="550" y="118" width="430" height="32" rx="12" fill="#22c55e" opacity="0.1"/>
  <rect x="550" y="138" width="430" height="12" fill="#22c55e" opacity="0.1"/>
  <text x="575" y="138" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">wrangling_pipeline.py</text>
  <line x1="550" y1="150" x2="980" y2="150" stroke="#22c55e" stroke-width="1" opacity="0.2"/>

  <text x="575" y="175" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">import</text>
  <text x="626" y="175" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> pandas </text>
  <text x="703" y="175" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">as</text>
  <text x="723" y="175" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> pd</text>

  <text x="575" y="200" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">df = pd.</text>
  <text x="635" y="200" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">read_csv</text>
  <text x="703" y="200" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(</text>
  <text x="712" y="200" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'data.csv'</text>
  <text x="784" y="200" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">)</text>

  <text x="575" y="225" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">df = df.</text>
  <text x="629" y="225" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">dropna</text>
  <text x="679" y="225" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">()</text>

  <text x="575" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">df[</text>
  <text x="596" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'grade'</text>
  <text x="647" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">] = df[</text>
  <text x="697" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'score'</text>
  <text x="748" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">].</text>
  <text x="763" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">apply</text>
  <text x="799" y="250" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(grade_fn)</text>

  <text x="575" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">result = df.</text>
  <text x="645" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">groupby</text>
  <text x="702" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(</text>
  <text x="710" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'grade'</text>
  <text x="762" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">)[</text>
  <text x="780" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'score'</text>
  <text x="831" y="275" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">] \</text>

  <text x="593" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">   .</text>
  <text x="614" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">agg</text>
  <text x="634" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">([</text>
  <text x="650" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'mean'</text>
  <text x="700" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">, </text>
  <text x="718" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'count'</text>
  <text x="771" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">])</text>

  <text x="575" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">result.</text>
  <text x="625" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">to_csv</text>
  <text x="673" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(</text>
  <text x="681" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e">'output.csv'</text>
  <text x="765" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">, index=</text>
  <text x="821" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#f43f5e">False</text>
  <text x="856" y="323" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">)</text>

  <!-- Mini bar chart -->
  <rect x="570" y="360" width="22" height="14" rx="2" fill="#22c55e" opacity="0.8"/>
  <rect x="596" y="352" width="22" height="22" rx="2" fill="#f59e0b" opacity="0.8"/>
  <rect x="622" y="345" width="22" height="29" rx="2" fill="#38bdf8" opacity="0.8"/>
  <rect x="648" y="356" width="22" height="18" rx="2" fill="#f43f5e" opacity="0.8"/>
  <text x="571" y="385" font-family="ui-monospace,monospace" font-size="9" fill="#334155">A</text>
  <text x="597" y="385" font-family="ui-monospace,monospace" font-size="9" fill="#334155">B</text>
  <text x="623" y="385" font-family="ui-monospace,monospace" font-size="9" fill="#334155">C</text>
  <text x="649" y="385" font-family="ui-monospace,monospace" font-size="9" fill="#334155">F</text>
  <text x="685" y="380" font-family="ui-monospace,monospace" font-size="10" fill="#334155">grade distribution</text>

