<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">About</text>
  <text x="510" y="115" text-anchor="middle" font-family="ui-monospace,monospace" font-size="44" font-weight="bold" fill="#38bdf8">Low Hanging Data</text>

  <!-- Three principle boxes -->

  <!-- Concise -->
  <rect x="55" y="155" width="284" height="185" rx="14" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="197" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="18" font-weight="bold" fill="#38bdf8">Concise</text>
  <line x1="80" y1="210" x2="314" y2="210" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <text x="197" y="238" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">State the finding in one</text>
  <text x="197" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">sentence. If it takes more,</text>
  <text x="197" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">the analysis isn't done yet.</text>

  <!-- Transparent -->
  <rect x="368" y="155" width="284" height="185" rx="14" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="18" font-weight="bold" fill="#f59e0b">Transparent</text>
  <line x1="393" y1="210" x2="627" y2="210" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  <text x="510" y="238" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">Sources, assumptions, and</text>
  <text x="510" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">limitations stated plainly.</text>
  <text x="510" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">Reproducibility is not optional.</text>

  <!-- Low Hanging Fruit First -->
  <rect x="681" y="155" width="284" height="185" rx="14" fill="#001a0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="823" y="191" text-anchor="middle" font-family="ui-monospace,monospace" font-size="18" font-weight="bold" fill="#22c55e">Low Hanging</text>
  <text x="823" y="213" text-anchor="middle" font-family="ui-monospace,monospace" font-size="18" font-weight="bold" fill="#22c55e">Fruit First</text>
  <line x1="706" y1="225" x2="940" y2="225" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
  <text x="823" y="253" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">Counts before clustering.</text>
  <text x="823" y="273" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">Complexity only when it</text>
  <text x="823" y="293" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">changes a conclusion.</text>

  <!-- Bottom tagline -->
  <text x="510" y="400" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#334155">practical · reproducible · actionable</text>

  <!-- Decorative apple icon (matching favicon theme) -->
  <circle cx="510" cy="452" r="10" fill="#f43f5e" opacity="0.7"/>
  <circle cx="506" cy="448" r="3" fill="#ffffff" opacity="0.25"/>
  <line x1="510" y1="442" x2="510" y2="439" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="515" cy="438" rx="4" ry="2" fill="#22c55e" transform="rotate(20 515 438)" opacity="0.8"/>
</svg>
