  <circle cx="510" cy="430" r="14" fill="#f43f5e" opacity="0.8"/>
  <circle cx="505" cy="425" r="4" fill="#ffffff" opacity="0.3"/>
  <line x1="510" y1="416" x2="510" y2="412" stroke="#a16207" stroke-width="2.5" stroke-linecap="round"/>
