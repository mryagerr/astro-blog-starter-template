<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Background bar chart (decorative, from favicon motif) -->
  <rect x="60" y="260" width="36" height="110" rx="5" fill="#38bdf8" opacity="0.08"/>
  <rect x="108" y="210" width="36" height="160" rx="5" fill="#38bdf8" opacity="0.08"/>
  <rect x="156" y="160" width="36" height="210" rx="5" fill="#38bdf8" opacity="0.08"/>
