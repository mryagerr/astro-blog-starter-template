<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Background grid lines (subtle) -->
  <line x1="0" y1="170" x2="1020" y2="170" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="340" x2="1020" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="255" y1="0" x2="255" y2="510" stroke="#1e293b" stroke-width="1"/>
  <line x1="510" y1="0" x2="510" y2="510" stroke="#1e293b" stroke-width="1"/>
