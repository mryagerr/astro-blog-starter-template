<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="22" font-weight="bold" fill="#e2e8f0">From Cheerleader to Quarterback:</text>
  <text x="510" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="22" font-weight="bold" fill="#38bdf8">Data Professionals Must Own the Field</text>

  <!-- Left column: Cheerleader (reactive) -->
  <rect x="55" y="115" width="360" height="42" rx="8" fill="#071a2e" stroke="#475569" stroke-width="1.5"/>
  <text x="235" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" font-weight="bold" fill="#94a3b8">Cheerleader Role</text>

  <rect x="55" y="170" width="360" height="36" rx="6" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="235" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">⏳  waits to be asked questions</text>

  <rect x="55" y="214" width="360" height="36" rx="6" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="235" y="236" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">📊  reports metrics after the fact</text>

  <rect x="55" y="258" width="360" height="36" rx="6" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="235" y="280" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">🔍  answers — doesn't frame problems</text>

  <rect x="55" y="302" width="360" height="36" rx="6" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="235" y="324" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">📋  supports decisions made by others</text>

  <rect x="55" y="346" width="360" height="36" rx="6" fill="#0d1f30" stroke="#334155" stroke-width="1"/>
  <text x="235" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">🎽  on the sideline, not the field</text>

  <!-- Center arrow -->
  <line x1="430" y1="265" x2="590" y2="265" stroke="#38bdf8" stroke-width="3"/>
  <polygon points="584,257 598,265 584,273" fill="#38bdf8"/>
  <text x="510" y="256" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">grow into</text>

  <!-- Right column: Quarterback (proactive) -->
  <rect x="608" y="115" width="360" height="42" rx="8" fill="#071a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="788" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" font-weight="bold" fill="#38bdf8">Quarterback Role</text>

  <rect x="608" y="170" width="360" height="36" rx="6" fill="#071828" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="788" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">🎯  proactively surfaces insights</text>

  <rect x="608" y="214" width="360" height="36" rx="6" fill="#071828" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="788" y="236" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">📈  frames the problem, not just data</text>

  <rect x="608" y="258" width="360" height="36" rx="6" fill="#071828" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="788" y="280" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">🧭  defines KPIs with the business</text>

  <rect x="608" y="302" width="360" height="36" rx="6" fill="#071828" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="788" y="324" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">🏆  drives decisions, doesn't just support</text>

  <rect x="608" y="346" width="360" height="36" rx="6" fill="#071828" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="788" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">🏈  half analyst, half domain expert</text>

  <!-- Bottom tagline -->
  <text x="510" y="456" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">the data professional of tomorrow owns the problem — not just the query</text>
</svg>
