<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Working with Parquet &amp;</text>
  <text x="510" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="38" font-weight="bold" fill="#38bdf8">DuckDB</text>

  <!-- LEFT: Row-based storage (CSV/SQLite) -->
  <rect x="40" y="116" width="390" height="260" rx="12" fill="#1a0a00" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="40" y="116" width="390" height="32" rx="12" fill="#f59e0b" opacity="0.12"/>
  <rect x="40" y="136" width="390" height="12" fill="#f59e0b" opacity="0.12"/>
  <text x="66" y="137" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">Row-based  (CSV / SQLite)</text>

  <!-- Row storage: each row is one continuous band -->
  <text x="66" y="170" font-family="ui-monospace,monospace" font-size="10" fill="#475569">ticker  date        open    high    low     close   volume</text>
  <rect x="55" y="176" width="364" height="24" rx="3" fill="#f59e0b" opacity="0.12"/>
  <text x="66" y="193" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">AAPL    2024-01-02  185.1   186.9   184.5   185.9   52M</text>
  <rect x="55" y="200" width="364" height="24" rx="3" fill="#f59e0b" opacity="0.07"/>
  <text x="66" y="217" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">AAPL    2024-01-03  185.9   186.2   183.1   184.3   58M</text>
  <rect x="55" y="224" width="364" height="24" rx="3" fill="#f59e0b" opacity="0.12"/>
  <text x="66" y="241" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">MSFT    2024-01-02  372.1   375.4   371.0   374.0   18M</text>
  <rect x="55" y="248" width="364" height="24" rx="3" fill="#f59e0b" opacity="0.07"/>
  <text x="66" y="265" font-family="ui-monospace,monospace" font-size="10" fill="#e2e8f0">MSFT    2024-01-03  374.0   376.8   372.2   375.9   21M</text>
  <rect x="55" y="272" width="364" height="24" rx="3" fill="#f59e0b" opacity="0.12"/>
  <text x="66" y="289" font-family="ui-monospace,monospace" font-size="10" fill="#334155">...     ...</text>

  <!-- Read penalty annotation -->
  <text x="66" y="320" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">SELECT AVG(close) reads every column</text>
  <text x="66" y="338" font-family="ui-monospace,monospace" font-size="10" fill="#475569">even those you don't need</text>
  <text x="66" y="358" font-family="ui-monospace,monospace" font-size="11" fill="#f43f5e">10M rows × 7 cols  →  scan all data</text>

  <!-- CENTER divider with arrow -->
  <line x1="446" y1="130" x2="446" y2="370" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="453" y1="245" x2="565" y2="245" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="8,5"/>
  <polygon points="558,238 574,245 558,252" fill="#38bdf8"/>
  <text x="509" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">convert</text>

  <!-- RIGHT: Columnar storage (Parquet) -->
  <rect x="590" y="116" width="390" height="260" rx="12" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="590" y="116" width="390" height="32" rx="12" fill="#38bdf8" opacity="0.12"/>
  <rect x="590" y="136" width="390" height="12" fill="#38bdf8" opacity="0.12"/>
  <text x="616" y="137" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">Columnar  (Parquet + DuckDB)</text>

  <!-- Column strips - each column stored together -->
  <text x="616" y="165" font-family="ui-monospace,monospace" font-size="10" fill="#475569">stored as column stripes:</text>
  <!-- ticker column strip -->
  <rect x="605" y="172" width="68" height="110" rx="4" fill="#38bdf8" opacity="0.18" stroke="#38bdf8" stroke-width="1"/>
  <text x="639" y="188" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">ticker</text>
  <text x="639" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">AAPL</text>
  <text x="639" y="219" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">AAPL</text>
  <text x="639" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">MSFT</text>
  <text x="639" y="249" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">MSFT</text>
  <text x="639" y="264" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">...</text>
  <text x="639" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">dict enc.</text>
  <!-- date column -->
  <rect x="679" y="172" width="68" height="110" rx="4" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-width="1"/>
  <text x="713" y="188" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">date</text>
  <text x="713" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">01-02</text>
  <text x="713" y="219" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">01-03</text>
  <text x="713" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">01-02</text>
  <text x="713" y="249" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">01-03</text>
  <text x="713" y="264" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">...</text>
  <text x="713" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">delta enc.</text>
  <!-- close column - highlighted -->
  <rect x="753" y="172" width="68" height="110" rx="4" fill="#22c55e" opacity="0.22" stroke="#22c55e" stroke-width="1.5"/>
  <text x="787" y="188" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">close ★</text>
  <text x="787" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">185.9</text>
  <text x="787" y="219" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">184.3</text>
  <text x="787" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">374.0</text>
  <text x="787" y="249" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22c55e">375.9</text>
  <text x="787" y="264" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">...</text>
  <text x="787" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">zstd</text>
  <!-- volume column -->
  <rect x="827" y="172" width="68" height="110" rx="4" fill="#38bdf8" opacity="0.08" stroke="#38bdf8" stroke-width="1"/>
  <text x="861" y="188" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#38bdf8">volume</text>
  <text x="861" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">52M</text>
  <text x="861" y="219" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">58M</text>
  <text x="861" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">18M</text>
  <text x="861" y="249" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">21M</text>
  <text x="861" y="264" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">...</text>
  <text x="861" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">rle</text>

  <!-- Read only close annotation -->
  <text x="616" y="320" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">SELECT AVG(close) reads only</text>
  <text x="616" y="338" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">the close column stripe</text>
  <text x="616" y="358" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">10M rows × 1 col  →  14× faster</text>

  <!-- DuckDB query block -->
  <rect x="40" y="386" width="910" height="68" rx="10" fill="#0d1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="66" y="410" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">SELECT</text>
  <text x="122" y="410" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> ticker, </text>
  <text x="194" y="410" font-family="ui-monospace,monospace" font-size="12" fill="#f59e0b">AVG</text>
  <text x="221" y="410" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">(close) </text>
  <text x="294" y="410" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">AS</text>
  <text x="316" y="410" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> avg_close  </text>
  <text x="66" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">FROM</text>
  <text x="112" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e"> 'prices.parquet'  </text>
  <text x="268" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">GROUP BY</text>
  <text x="345" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> ticker  </text>
  <text x="412" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">ORDER BY</text>
  <text x="489" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0"> avg_close </text>
  <text x="574" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#38bdf8">DESC</text>
  <text x="616" y="436" font-family="ui-monospace,monospace" font-size="12" fill="#e2e8f0">;</text>
</svg>
