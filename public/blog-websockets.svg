<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">WebSockets &amp; Streaming</text>
  <text x="510" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="38" font-weight="bold" fill="#38bdf8">Real-Time Data</text>

  <!-- CLIENT box -->
  <rect x="40" y="120" width="210" height="200" rx="14" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <!-- Monitor icon -->
  <rect x="75" y="142" width="140" height="90" rx="6" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <rect x="75" y="142" width="140" height="22" rx="6" fill="#38bdf8" opacity="0.15"/>
  <line x1="130" y1="232" x2="130" y2="246" stroke="#38bdf8" stroke-width="2"/>
  <line x1="160" y1="232" x2="160" y2="246" stroke="#38bdf8" stroke-width="2"/>
  <line x1="113" y1="246" x2="177" y2="246" stroke="#38bdf8" stroke-width="2.5"/>
  <!-- Code lines -->
  <line x1="86" y1="176" x2="148" y2="176" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="86" y1="189" x2="135" y2="189" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
  <line x1="86" y1="202" x2="142" y2="202" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
  <line x1="86" y1="215" x2="125" y2="215" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
  <text x="145" y="266" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">CLIENT</text>
  <text x="145" y="285" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">async websocket</text>
  <text x="145" y="300" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">write to CSV / DB</text>

  <!-- SERVER box -->
  <rect x="770" y="120" width="210" height="200" rx="14" fill="#001a0a" stroke="#22c55e" stroke-width="2"/>
  <!-- Server racks -->
  <rect x="810" y="148" width="130" height="24" rx="4" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="825" cy="160" r="5" fill="#22c55e" opacity="0.8"/>
  <line x1="838" y1="160" x2="928" y2="160" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <rect x="810" y="180" width="130" height="24" rx="4" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="825" cy="192" r="5" fill="#22c55e" opacity="0.5"/>
  <line x1="838" y1="192" x2="928" y2="192" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <rect x="810" y="212" width="130" height="24" rx="4" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="825" cy="224" r="5" fill="#22c55e" opacity="0.8"/>
  <line x1="838" y1="224" x2="928" y2="224" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <text x="875" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">SERVER</text>
  <text x="875" y="281" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">Alpaca / broker</text>
  <text x="875" y="296" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">wss://stream.alpaca…</text>

  <!-- Handshake line -->
  <line x1="254" y1="178" x2="767" y2="178" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="760,171 775,178 760,185" fill="#f59e0b"/>
  <rect x="385" y="162" width="250" height="24" rx="6" fill="#1a1200"/>
  <text x="510" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">GET /stream  Upgrade: websocket</text>

  <!-- Tick stream arrows (server → client) -->
  <line x1="767" y1="220" x2="254" y2="220" stroke="#22c55e" stroke-width="2"/>
  <polygon points="261,213 246,220 261,227" fill="#22c55e"/>
  <rect x="355" y="207" width="310" height="24" rx="6" fill="#001a0a"/>
  <text x="510" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">{AAPL, 185.92, 1000, 14:30:01.234}</text>

  <line x1="767" y1="252" x2="254" y2="252" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <polygon points="261,245 246,252 261,259" fill="#22c55e" opacity="0.7"/>
  <rect x="365" y="239" width="290" height="24" rx="6" fill="#001a0a" opacity="0.7"/>
  <text x="510" y="254" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e" opacity="0.85">{AAPL, 185.94,  500, 14:30:01.891}</text>

  <line x1="767" y1="284" x2="254" y2="284" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <polygon points="261,277 246,284 261,291" fill="#22c55e" opacity="0.5"/>
  <rect x="375" y="271" width="270" height="24" rx="6" fill="#001a0a" opacity="0.5"/>
  <text x="510" y="286" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e" opacity="0.65">{AAPL, 185.91,  200, 14:30:02.107}</text>

  <!-- Reconnection note -->
  <text x="510" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">⟳ exponential backoff reconnect on disconnect</text>

  <!-- Aggregation panel -->
  <rect x="40" y="354" width="450" height="100" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="66" y="374" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">Tick → OHLCV aggregation (30-min bars)</text>
  <text x="66" y="395" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">open  = first tick.price</text>
  <text x="66" y="413" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">high  = max(tick.price)</text>
  <text x="66" y="431" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">close = last tick.price   volume = sum(tick.size)</text>
  <text x="270" y="395" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">low   = min(tick.price)</text>

  <!-- Storage panel -->
  <rect x="530" y="354" width="450" height="100" rx="10" fill="#001a0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="556" y="374" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">Storage pattern</text>
  <text x="556" y="395" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">raw ticks   →  data/ticks/AAPL_20240102.csv</text>
  <text x="556" y="413" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">30-min bars →  data/ohlcv/AAPL_30m.parquet</text>
  <text x="556" y="431" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">flush to disk every N ticks · never lose data</text>

  <!-- Footer -->
  <text x="510" y="476" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#334155">persistent connection  ·  async/await  ·  reconnect  ·  aggregate  ·  store</text>
</svg>
