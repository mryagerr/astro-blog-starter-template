<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">Working with WebSockets</text>
  <text x="510" y="88" text-anchor="middle" font-family="ui-monospace,monospace" font-size="30" font-weight="bold" fill="#38bdf8">and Streaming Data</text>

  <!-- Client box -->
  <rect x="55" y="165" width="210" height="180" rx="10" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <rect x="55" y="165" width="210" height="34" rx="10" fill="#0d1117"/>
  <rect x="55" y="183" width="210" height="16" fill="#0d1117"/>
  <circle cx="78" cy="182" r="5" fill="#f43f5e" opacity="0.8"/>
  <circle cx="96" cy="182" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="114" cy="182" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="160" y="187" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">client.py</text>
  <text x="72" y="215" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">ws = connect(</text>
  <text x="72" y="232" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">  "wss://feed"</text>
  <text x="72" y="249" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">)</text>
  <text x="72" y="270" font-family="ui-monospace,monospace" font-size="11" fill="#475569">for msg in ws:</text>
  <text x="72" y="287" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">  process(msg)</text>
  <text x="72" y="325" font-family="ui-monospace,monospace" font-size="11" fill="#334155">▊</text>

  <!-- Server box -->
  <rect x="755" y="165" width="210" height="180" rx="10" fill="#071828" stroke="#22c55e" stroke-width="2"/>
  <rect x="755" y="165" width="210" height="34" rx="10" fill="#0d1117"/>
  <rect x="755" y="183" width="210" height="16" fill="#0d1117"/>
  <circle cx="778" cy="182" r="5" fill="#f43f5e" opacity="0.8"/>
  <circle cx="796" cy="182" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="814" cy="182" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="860" y="187" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">server / feed</text>
  <text x="772" y="218" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">emit("price", {</text>
  <text x="772" y="236" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">  ticker: "AAPL",</text>
  <text x="772" y="254" font-family="ui-monospace,monospace" font-size="11" fill="#f59e0b">  price: 189.42,</text>
  <text x="772" y="272" font-family="ui-monospace,monospace" font-size="11" fill="#e2e8f0">  ts: 1711500001</text>
  <text x="772" y="290" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">})</text>

  <!-- Bidirectional arrows in the middle -->
  <!-- Downward arrow (server → client): streaming data -->
  <line x1="540" y1="210" x2="270" y2="240" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="275,233 265,241 274,249" fill="#22c55e"/>
  <text x="420" y="205" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#22c55e">stream: price ticks</text>

  <!-- Upward arrow (client → server): subscribe/commands -->
  <line x1="270" y1="290" x2="755" y2="260" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="746,253 757,261 748,268" fill="#38bdf8"/>
  <text x="510" y="285" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">subscribe: ["AAPL","TSLA"]</text>

  <!-- WebSocket label in center -->
  <rect x="390" y="305" width="240" height="44" rx="10" fill="#0d1f30" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="510" y="323" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">WebSocket</text>
  <text x="510" y="340" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">persistent · full-duplex · low-latency</text>

  <!-- Streaming wave dots -->
  <circle cx="330" cy="380" r="4" fill="#22c55e" opacity="0.9"/>
  <circle cx="360" cy="375" r="4" fill="#22c55e" opacity="0.7"/>
  <circle cx="390" cy="382" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="420" cy="374" r="4" fill="#22c55e" opacity="0.9"/>
  <circle cx="450" cy="381" r="4" fill="#22c55e" opacity="0.6"/>
  <circle cx="480" cy="376" r="4" fill="#22c55e" opacity="0.8"/>
  <circle cx="510" cy="383" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="540" cy="374" r="4" fill="#22c55e" opacity="0.9"/>
  <circle cx="570" cy="380" r="4" fill="#22c55e" opacity="0.7"/>
  <circle cx="600" cy="375" r="4" fill="#22c55e" opacity="0.6"/>
  <circle cx="630" cy="382" r="4" fill="#22c55e" opacity="0.8"/>
  <circle cx="660" cy="376" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="690" cy="380" r="4" fill="#22c55e" opacity="0.9"/>

  <!-- Bottom tagline -->
  <text x="510" y="455" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">unlike REST, WebSockets push data continuously — ideal for real-time feeds</text>
</svg>
