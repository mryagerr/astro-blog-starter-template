<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Scatter plot: data analysis theme -->
  <!-- Axes -->
  <line x1="100" y1="100" x2="100" y2="420" stroke="#334155" stroke-width="2"/>
  <line x1="100" y1="420" x2="720" y2="420" stroke="#334155" stroke-width="2"/>

  <!-- Grid lines -->
  <line x1="100" y1="180" x2="720" y2="180" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="260" x2="720" y2="260" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="340" x2="720" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="255" y1="100" x2="255" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="410" y1="100" x2="410" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="565" y1="100" x2="565" y2="420" stroke="#1e293b" stroke-width="1"/>

  <!-- Scatter points: cluster 1 (cyan) -->
  <circle cx="155" cy="360" r="6" fill="#38bdf8" opacity="0.8"/>
  <circle cx="185" cy="340" r="5" fill="#38bdf8" opacity="0.8"/>
  <circle cx="210" cy="320" r="7" fill="#38bdf8" opacity="0.8"/>
  <circle cx="170" cy="375" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="230" cy="350" r="6" fill="#38bdf8" opacity="0.8"/>
  <circle cx="145" cy="395" r="5" fill="#38bdf8" opacity="0.8"/>

  <!-- Scatter points: cluster 2 (amber) -->
  <circle cx="370" cy="240" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="400" cy="210" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="420" cy="255" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="360" cy="270" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="440" cy="230" r="4" fill="#f59e0b" opacity="0.8"/>

  <!-- Scatter points: cluster 3 (green) -->
  <circle cx="560" cy="145" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="590" cy="130" r="5" fill="#22c55e" opacity="0.8"/>
  <circle cx="610" cy="160" r="6" fill="#22c55e" opacity="0.8"/>
  <circle cx="640" cy="140" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="580" cy="170" r="4" fill="#22c55e" opacity="0.8"/>
  <circle cx="650" cy="120" r="5" fill="#22c55e" opacity="0.8"/>

  <!-- Trend line -->
  <line x1="120" y1="400" x2="690" y2="120" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="10,6" opacity="0.3"/>

  <!-- Title -->
  <text x="860" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="20" font-weight="bold" fill="#e2e8f0">Data</text>
  <text x="860" y="232" text-anchor="middle" font-family="ui-monospace,monospace" font-size="20" font-weight="bold" fill="#e2e8f0">Analysis</text>
  <text x="860" y="265" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#38bdf8">find the signal</text>
  <line x1="775" y1="290" x2="945" y2="290" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <text x="860" y="318" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">Low Hanging Data</text>
</svg>
