  <circle cx="510" cy="255" r="33" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="510" cy="255" r="14" fill="#f59e0b" opacity="0.9"/>
  <rect x="505" y="215" width="10" height="14" rx="3" fill="#f59e0b"/>
  <rect x="505" y="281" width="10" height="14" rx="3" fill="#f59e0b"/>
  <rect x="469" y="250" width="14" height="10" rx="3" fill="#f59e0b"/>
  <rect x="537" y="250" width="14" height="10" rx="3" fill="#f59e0b"/>
  <rect x="480" y="222" width="10" height="14" rx="3" fill="#f59e0b" transform="rotate(-45 485 229)"/>
  <rect x="526" y="222" width="10" height="14" rx="3" fill="#f59e0b" transform="rotate(45 531 229)"/>
