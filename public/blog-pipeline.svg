  <text x="510" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Building Your First</text>
  <text x="510" y="112" text-anchor="middle" font-family="ui-monospace,monospace" font-size="38" font-weight="bold" fill="#38bdf8">Data Pipeline</text>

  <!-- COLLECT box -->
  <rect x="55" y="185" width="210" height="165" rx="14" fill="#071a2e" stroke="#38bdf8" stroke-width="2"/>
  <ellipse cx="160" cy="232" rx="38" ry="11" fill="#38bdf8" opacity="0.8"/>
  <rect x="122" y="232" width="76" height="36" fill="#38bdf8" opacity="0.35"/>
  <ellipse cx="160" cy="268" rx="38" ry="11" fill="#38bdf8" opacity="0.8"/>
  <line x1="122" y1="232" x2="122" y2="268" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="198" y1="232" x2="198" y2="268" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <text x="160" y="310" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" font-weight="bold" fill="#38bdf8">COLLECT</text>
  <text x="160" y="330" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">raw data sources</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="267" x2="375" y2="267" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8,5"/>
  <polygon points="368,260 385,267 368,274" fill="#f59e0b"/>

