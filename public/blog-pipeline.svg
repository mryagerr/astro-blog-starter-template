  <text x="510" y="330" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">clean &amp; reshape</text>

  <!-- Arrow 2 -->
  <line x1="637" y1="267" x2="742" y2="267" stroke="#22c55e" stroke-width="3" stroke-dasharray="8,5"/>
  <polygon points="735,260 752,267 735,274" fill="#22c55e"/>

  <!-- LOAD box -->
  <rect x="755" y="185" width="210" height="165" rx="14" fill="#001a0a" stroke="#22c55e" stroke-width="2"/>
  <ellipse cx="860" cy="232" rx="38" ry="11" fill="#22c55e" opacity="0.8"/>
  <rect x="822" y="232" width="76" height="36" fill="#22c55e" opacity="0.3"/>
  <ellipse cx="860" cy="268" rx="38" ry="11" fill="#22c55e" opacity="0.8"/>
  <path d="M843 250 L857 264 L882 236" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="860" y="310" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" font-weight="bold" fill="#22c55e">LOAD</text>
