<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#e2e8f0">Building a Stock Prediction</text>
  <text x="510" y="88" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="bold" fill="#38bdf8">Pipeline</text>

  <!-- Stock chart (top section) -->
  <rect x="55" y="115" width="910" height="175" rx="10" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="75" y="145" font-family="ui-monospace,monospace" font-size="9" fill="#334155">$185</text>
  <text x="75" y="175" font-family="ui-monospace,monospace" font-size="9" fill="#334155">$175</text>
  <text x="75" y="205" font-family="ui-monospace,monospace" font-size="9" fill="#334155">$165</text>
  <text x="75" y="235" font-family="ui-monospace,monospace" font-size="9" fill="#334155">$155</text>
  <text x="75" y="265" font-family="ui-monospace,monospace" font-size="9" fill="#334155">$145</text>

  <!-- Horizontal grid lines -->
  <line x1="108" y1="140" x2="945" y2="140" stroke="#1e293b" stroke-width="1"/>
  <line x1="108" y1="170" x2="945" y2="170" stroke="#1e293b" stroke-width="1"/>
  <line x1="108" y1="200" x2="945" y2="200" stroke="#1e293b" stroke-width="1"/>
  <line x1="108" y1="230" x2="945" y2="230" stroke="#1e293b" stroke-width="1"/>
  <line x1="108" y1="260" x2="945" y2="260" stroke="#1e293b" stroke-width="1"/>

  <!-- Actual price line (historical) -->
  <polyline points="115,235 155,225 195,240 235,215 275,200 315,210 355,195 395,185 435,200 475,215 515,205" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area under actual -->
  <polygon points="115,235 155,225 195,240 235,215 275,200 315,210 355,195 395,185 435,200 475,215 515,205 515,275 115,275" fill="#38bdf8" opacity="0.05"/>

  <!-- Predicted price line (dashed, continues) -->
  <polyline points="515,205 555,195 595,185 635,175 675,168 715,178 755,162" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Confidence band -->
  <polygon points="515,205 555,185 595,168 635,155 675,145 715,158 755,140 755,185 715,198 675,192 635,196 595,204 555,208 515,222" fill="#f59e0b" opacity="0.07"/>

  <!-- Divider line (now) -->
  <line x1="515" y1="115" x2="515" y2="290" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="515" y="305" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">now</text>

  <!-- Labels -->
  <text x="300" y="133" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">─ actual</text>
  <text x="620" y="133" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">- - predicted</text>

  <!-- Pipeline steps (bottom) -->
  <!-- Step 1: Ingest -->
  <rect x="55" y="332" width="178" height="110" rx="12" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="144" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">1. INGEST</text>
  <text x="144" y="378" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">Yahoo Finance API</text>
  <text x="144" y="396" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">OHLCV · volume</text>
  <text x="144" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">news sentiment</text>
  <text x="144" y="432" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">daily batch</text>

  <!-- Arrow -->
  <line x1="233" y1="387" x2="268" y2="387" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="261,380 276,387 261,394" fill="#f59e0b"/>

  <!-- Step 2: Feature -->
  <rect x="276" y="332" width="178" height="110" rx="12" fill="#071828" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="365" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f59e0b">2. FEATURES</text>
  <text x="365" y="378" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">RSI, MACD, EMA</text>
  <text x="365" y="396" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">rolling averages</text>
  <text x="365" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">lag features</text>
  <text x="365" y="432" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">pandas + ta-lib</text>

  <!-- Arrow -->
  <line x1="454" y1="387" x2="489" y2="387" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="482,380 497,387 482,394" fill="#a78bfa"/>

  <!-- Step 3: Model -->
  <rect x="497" y="332" width="178" height="110" rx="12" fill="#071828" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="586" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#a78bfa">3. MODEL</text>
  <text x="586" y="378" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">scikit-learn SVM</text>
  <text x="586" y="396" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">train / test split</text>
  <text x="586" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">cross-validation</text>
  <text x="586" y="432" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">accuracy: 61%</text>

  <!-- Arrow -->
  <line x1="675" y1="387" x2="710" y2="387" stroke="#22c55e" stroke-width="2"/>
  <polygon points="703,380 718,387 703,394" fill="#22c55e"/>

  <!-- Step 4: Signal -->
  <rect x="718" y="332" width="247" height="110" rx="12" fill="#071828" stroke="#22c55e" stroke-width="1.5"/>
  <text x="842" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#22c55e">4. SIGNAL</text>
  <text x="842" y="378" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">BUY / HOLD / SELL</text>
  <text x="842" y="396" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">confidence score</text>
  <text x="842" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">email alert on trigger</text>
  <text x="842" y="432" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#334155">not financial advice</text>

  <!-- Bottom tagline -->
  <text x="510" y="475" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">end-to-end · automated · transparent</text>
</svg>
