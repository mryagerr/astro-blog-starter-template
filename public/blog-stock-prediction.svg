<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Stock Prediction</text>
  <text x="510" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="36" font-weight="bold" fill="#38bdf8">Pipeline</text>

  <!-- Fan-in lines: inputs to SVM -->
  <line x1="210" y1="205" x2="380" y2="258" stroke="#334155" stroke-width="1.5"/>
  <line x1="210" y1="273" x2="380" y2="273" stroke="#334155" stroke-width="1.5"/>
  <line x1="210" y1="341" x2="380" y2="288" stroke="#334155" stroke-width="1.5"/>

  <!-- SVM to Output arrow -->
  <line x1="560" y1="273" x2="628" y2="273" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="621,266 638,273 621,280" fill="#38bdf8"/>

  <!-- Input 1: Reddit Sentiment -->
  <rect x="50" y="181" width="160" height="48" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.8"/>
  <text x="130" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">sentiment</text>
  <text x="130" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f43f5e">Reddit Posts</text>

  <!-- Input 2: Google Trends -->
  <rect x="50" y="249" width="160" height="48" rx="10" fill="#1a1200" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="130" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">search volume</text>
  <text x="130" y="288" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#f59e0b">Google Trends</text>

  <!-- Input 3: NYSE Prices -->
  <rect x="50" y="317" width="160" height="48" rx="10" fill="#071a2e" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="130" y="338" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">price data</text>
  <text x="130" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="bold" fill="#38bdf8">NYSE Prices</text>

  <!-- SVM Classifier -->
  <rect x="380" y="240" width="180" height="66" rx="12" fill="#0d1a2e" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="470" y="264" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">classifier</text>
  <text x="470" y="284" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="bold" fill="#38bdf8">SVM</text>
  <text x="470" y="300" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">30-min window</text>

  <!-- Output box -->
  <rect x="640" y="220" width="290" height="106" rx="12" fill="#0d1117" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="785" y="244" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">signal output</text>
  <!-- UP result -->
  <rect x="658" y="254" width="118" height="40" rx="8" fill="#052e05" stroke="#22c55e" stroke-width="1.5"/>
  <text x="717" y="279" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="bold" fill="#22c55e">UP +3.2%</text>
  <!-- DOWN result -->
  <rect x="794" y="254" width="118" height="40" rx="8" fill="#1a0505" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="853" y="279" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="bold" fill="#f43f5e">DN -1.8%</text>
  <text x="785" y="312" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">predicted directional move</text>

  <!-- Label below SVM -->
  <text x="470" y="328" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#334155">Support Vector Machine</text>

  <!-- Tagline -->
  <text x="510" y="462" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#334155">Reddit sentiment + search trends + price history → directional signal</text>
</svg>
