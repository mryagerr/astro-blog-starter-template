<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Visualizing Data</text>
  <text x="510" y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="32" font-weight="bold" fill="#38bdf8">with Python</text>

  <!-- 2x2 chart grid -->

  <!-- Top-left: Bar chart -->
  <rect x="55" y="110" width="410" height="170" rx="8" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="260" y="130" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">bar chart · matplotlib</text>
  <!-- bars -->
  <rect x="90" y="195" width="36" height="62" rx="3" fill="#38bdf8" opacity="0.7"/>
  <rect x="142" y="175" width="36" height="82" rx="3" fill="#38bdf8" opacity="0.7"/>
  <rect x="194" y="158" width="36" height="99" rx="3" fill="#0891b2" opacity="0.85"/>
  <rect x="246" y="172" width="36" height="85" rx="3" fill="#38bdf8" opacity="0.7"/>
  <rect x="298" y="148" width="36" height="109" rx="3" fill="#38bdf8" opacity="0.7"/>
  <rect x="350" y="184" width="36" height="73" rx="3" fill="#38bdf8" opacity="0.7"/>
  <line x1="75" y1="257" x2="410" y2="257" stroke="#334155" stroke-width="1.5"/>

  <!-- Top-right: Line chart -->
  <rect x="555" y="110" width="410" height="170" rx="8" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="760" y="130" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">line chart · seaborn</text>
  <!-- grid -->
  <line x1="575" y1="165" x2="945" y2="165" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="575" y1="200" x2="945" y2="200" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="575" y1="235" x2="945" y2="235" stroke="#1e293b" stroke-width="0.8"/>
  <!-- line -->
  <polyline points="590,240 640,225 690,210 740,195 790,180 840,190 890,165 940,155" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <!-- shaded area -->
  <polygon points="590,240 640,225 690,210 740,195 790,180 840,190 890,165 940,155 940,255 590,255" fill="#22c55e" opacity="0.1"/>
  <line x1="575" y1="255" x2="945" y2="255" stroke="#334155" stroke-width="1.5"/>

  <!-- Bottom-left: Scatter plot -->
  <rect x="55" y="300" width="410" height="170" rx="8" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="260" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">scatter plot · matplotlib</text>
  <!-- scatter points -->
  <circle cx="115" cy="435" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="145" cy="410" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="175" cy="420" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="210" cy="390" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="240" cy="380" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="270" cy="370" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="300" cy="360" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="335" cy="345" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="365" cy="350" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="395" cy="335" r="5" fill="#f59e0b" opacity="0.8"/>
  <!-- trend line -->
  <line x1="100" y1="445" x2="415" y2="325" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="70" y1="455" x2="445" y2="455" stroke="#334155" stroke-width="1.5"/>

  <!-- Bottom-right: Heatmap -->
  <rect x="555" y="300" width="410" height="170" rx="8" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <text x="760" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">heatmap · seaborn</text>
  <!-- heatmap cells (5x4 grid) -->
  <rect x="580" y="332" width="60" height="36" fill="#0891b2" opacity="0.9"/>
  <rect x="644" y="332" width="60" height="36" fill="#0891b2" opacity="0.6"/>
  <rect x="708" y="332" width="60" height="36" fill="#38bdf8" opacity="0.3"/>
  <rect x="772" y="332" width="60" height="36" fill="#0891b2" opacity="0.8"/>
  <rect x="836" y="332" width="60" height="36" fill="#0891b2" opacity="0.4"/>
  <rect x="580" y="372" width="60" height="36" fill="#38bdf8" opacity="0.4"/>
  <rect x="644" y="372" width="60" height="36" fill="#0891b2" opacity="0.9"/>
  <rect x="708" y="372" width="60" height="36" fill="#0891b2" opacity="0.7"/>
  <rect x="772" y="372" width="60" height="36" fill="#38bdf8" opacity="0.2"/>
  <rect x="836" y="372" width="60" height="36" fill="#0891b2" opacity="0.6"/>
  <rect x="580" y="412" width="60" height="36" fill="#0891b2" opacity="0.7"/>
  <rect x="644" y="412" width="60" height="36" fill="#38bdf8" opacity="0.3"/>
  <rect x="708" y="412" width="60" height="36" fill="#0891b2" opacity="1.0"/>
  <rect x="772" y="412" width="60" height="36" fill="#0891b2" opacity="0.5"/>
  <rect x="836" y="412" width="60" height="36" fill="#38bdf8" opacity="0.8"/>
  <!-- cell values -->
  <text x="610" y="355" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#e2e8f0">0.91</text>
  <text x="674" y="355" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#e2e8f0">0.62</text>
  <text x="738" y="355" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">0.28</text>
  <text x="802" y="355" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#e2e8f0">0.80</text>
  <text x="866" y="355" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">0.41</text>

  <!-- Bottom tagline -->
  <text x="510" y="492" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">the right chart type makes or breaks the insight — choose deliberately</text>
</svg>
