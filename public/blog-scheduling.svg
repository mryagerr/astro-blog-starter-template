<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="bold" fill="#e2e8f0">Scheduling and Automating</text>
  <text x="510" y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="30" font-weight="bold" fill="#38bdf8">Data Pipelines</text>

  <!-- Cron expression panel -->
  <rect x="55" y="115" width="430" height="180" rx="10" fill="#071828" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="55" y="115" width="430" height="34" rx="10" fill="#0d1117"/>
  <rect x="55" y="133" width="430" height="16" fill="#0d1117"/>
  <circle cx="78" cy="132" r="6" fill="#f43f5e" opacity="0.8"/>
  <circle cx="98" cy="132" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="118" cy="132" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="270" y="137" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">crontab — pipeline.sh</text>

  <!-- Cron expressions -->
  <text x="78" y="170" font-family="ui-monospace,monospace" font-size="12" fill="#334155"># ┌─ min  ┬─ hour  ┬─ day  ┬─ month  ┬─ dow</text>
  <text x="78" y="192" font-family="ui-monospace,monospace" font-size="13" fill="#38bdf8">0  6  *  *  1-5</text>
  <text x="260" y="192" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e"> extract.py</text>
  <text x="78" y="215" font-family="ui-monospace,monospace" font-size="13" fill="#38bdf8">30 6  *  *  1-5</text>
  <text x="260" y="215" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e"> transform.py</text>
  <text x="78" y="238" font-family="ui-monospace,monospace" font-size="13" fill="#38bdf8">0  7  *  *  1-5</text>
  <text x="260" y="238" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e"> load.py</text>
  <text x="78" y="261" font-family="ui-monospace,monospace" font-size="13" fill="#38bdf8">0  0  *  *  0</text>
  <text x="260" y="261" font-family="ui-monospace,monospace" font-size="13" fill="#a78bfa"> weekly_report.py</text>
  <text x="460" y="261" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">▊</text>

  <!-- Pipeline steps (right) -->
  <!-- Extract -->
  <rect x="535" y="115" width="150" height="64" rx="8" fill="#071828" stroke="#38bdf8" stroke-width="2"/>
  <text x="610" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#38bdf8">Extract</text>
  <text x="610" y="162" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">API · DB · files</text>
  <!-- Arrow -->
  <line x1="610" y1="179" x2="610" y2="210" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="604,205 610,218 616,205" fill="#38bdf8"/>

  <!-- Transform -->
  <rect x="535" y="218" width="150" height="64" rx="8" fill="#071828" stroke="#f59e0b" stroke-width="2"/>
  <text x="610" y="246" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#f59e0b">Transform</text>
  <text x="610" y="265" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">clean · enrich · agg</text>
  <!-- Arrow -->
  <line x1="610" y1="282" x2="610" y2="313" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="604,308 610,320 616,308" fill="#f59e0b"/>

  <!-- Load -->
  <rect x="535" y="320" width="150" height="64" rx="8" fill="#071828" stroke="#22c55e" stroke-width="2"/>
  <text x="610" y="348" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="bold" fill="#22c55e">Load</text>
  <text x="610" y="367" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569">DW · S3 · dashboard</text>

  <!-- Schedule clock visual -->
  <circle cx="830" cy="250" r="130" fill="none" stroke="#1e293b" stroke-width="2"/>
  <circle cx="830" cy="250" r="120" fill="#071828" stroke="#1e293b" stroke-width="1"/>
  <!-- Clock ticks (12 positions) -->
  <line x1="830" y1="135" x2="830" y2="148" stroke="#334155" stroke-width="2"/>
  <line x1="895" y1="155" x2="889" y2="166" stroke="#334155" stroke-width="2"/>
  <line x1="945" y1="250" x2="932" y2="250" stroke="#334155" stroke-width="2"/>
  <line x1="895" y1="345" x2="889" y2="334" stroke="#334155" stroke-width="2"/>
  <line x1="830" y1="365" x2="830" y2="352" stroke="#334155" stroke-width="2"/>
  <line x1="765" y1="345" x2="771" y2="334" stroke="#334155" stroke-width="2"/>
  <line x1="715" y1="250" x2="728" y2="250" stroke="#334155" stroke-width="2"/>
  <line x1="765" y1="155" x2="771" y2="166" stroke="#334155" stroke-width="2"/>
  <!-- Clock labels -->
  <text x="830" y="128" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">12</text>
  <text x="956" y="255" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">3</text>
  <text x="830" y="380" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">6</text>
  <text x="704" y="255" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#475569">9</text>
  <!-- Hour hand (pointing to 6 AM area) -->
  <line x1="830" y1="250" x2="830" y2="300" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="830" y1="250" x2="870" y2="220" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="830" cy="250" r="6" fill="#38bdf8"/>
  <text x="830" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">6:00 AM</text>
  <text x="830" y="216" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#475569">daily run</text>

  <!-- Bottom tagline -->
  <text x="510" y="456" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#334155">automate the routine — extract → transform → load, every day, unattended</text>
</svg>
