<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 510">
  <rect width="1020" height="510" fill="#0f172a"/>

  <!-- Title -->
  <text x="510" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="bold" fill="#e2e8f0">Scheduling &amp; Automating</text>
  <text x="510" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="38" font-weight="bold" fill="#38bdf8">Data Pipelines</text>

  <!-- Cron expression breakdown panel -->
  <rect x="40" y="116" width="550" height="200" rx="12" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="66" y="136" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">cron expression</text>

  <!-- Cron expression display -->
  <rect x="55" y="145" width="520" height="44" rx="8" fill="#0a1628"/>
  <text x="96" y="174" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#f59e0b">0</text>
  <text x="150" y="174" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#22c55e">20</text>
  <text x="215" y="174" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#38bdf8">*</text>
  <text x="268" y="174" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#38bdf8">*</text>
  <text x="318" y="174" font-family="ui-monospace,monospace" font-size="24" font-weight="bold" fill="#f43f5e">1-5</text>

  <!-- Field labels with arrows -->
  <line x1="104" y1="189" x2="104" y2="210" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <text x="104" y="224" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f59e0b">minute</text>
  <text x="104" y="237" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">:00</text>

  <line x1="163" y1="189" x2="163" y2="210" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <text x="163" y="224" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">hour</text>
  <text x="163" y="237" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">8 PM UTC</text>

  <line x1="220" y1="189" x2="220" y2="210" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
  <text x="220" y="224" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">day/mo</text>
  <text x="220" y="237" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">any</text>

  <line x1="271" y1="189" x2="271" y2="210" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
  <text x="271" y="224" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8">month</text>
  <text x="271" y="237" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">any</text>

  <line x1="332" y1="189" x2="332" y2="210" stroke="#f43f5e" stroke-width="1.5" opacity="0.7"/>
  <text x="332" y="224" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f43f5e">day/week</text>
  <text x="332" y="237" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Mon–Fri</text>

  <text x="66" y="265" font-family="ui-monospace,monospace" font-size="12" fill="#475569"># Every weekday at 8 PM UTC (market close + buffer)</text>
  <text x="66" y="285" font-family="ui-monospace,monospace" font-size="12" fill="#475569">0 20 * * 1-5  python /pipelines/fetch_prices.py</text>
  <text x="66" y="305" font-family="ui-monospace,monospace" font-size="12" fill="#475569">                         &gt;&gt; /logs/pipeline.log 2&gt;&amp;1</text>

  <!-- Tool comparison panel -->
  <rect x="610" y="116" width="370" height="200" rx="12" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="636" y="136" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">choose your scheduler</text>

  <!-- Tool rows -->
  <rect x="622" y="144" width="346" height="34" rx="6" fill="#22c55e" opacity="0.08"/>
  <text x="640" y="162" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#22c55e">cron</text>
  <text x="710" y="162" font-family="ui-monospace,monospace" font-size="10" fill="#475569">single script · no install · zero overhead</text>

  <rect x="622" y="182" width="346" height="34" rx="6" fill="#f59e0b" opacity="0.08"/>
  <text x="640" y="200" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#f59e0b">APScheduler</text>
  <text x="740" y="200" font-family="ui-monospace,monospace" font-size="10" fill="#475569">in-process · interval + cron · no UI</text>

  <rect x="622" y="220" width="346" height="34" rx="6" fill="#38bdf8" opacity="0.08"/>
  <text x="640" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#38bdf8">Prefect</text>
  <text x="706" y="238" font-family="ui-monospace,monospace" font-size="10" fill="#475569">flows + tasks · retries · web UI</text>

  <rect x="622" y="258" width="346" height="34" rx="6" fill="#475569" opacity="0.08"/>
  <text x="640" y="276" font-family="ui-monospace,monospace" font-size="11" font-weight="bold" fill="#475569">Airflow / Dagster</text>
  <text x="770" y="276" font-family="ui-monospace,monospace" font-size="10" fill="#334155">team · complex deps · DAG UI</text>

  <text x="636" y="302" font-family="ui-monospace,monospace" font-size="10" fill="#334155">cron handles 80% of cases · add complexity only when needed</text>

  <!-- Pipeline run timeline -->
  <rect x="40" y="330" width="940" height="120" rx="12" fill="#071828" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="66" y="350" font-family="ui-monospace,monospace" font-size="11" fill="#38bdf8">daily run timeline  (Mon – Fri at 20:00 UTC)</text>

  <!-- Timeline axis -->
  <line x1="66" y1="378" x2="960" y2="378" stroke="#334155" stroke-width="1.5"/>

  <!-- Day ticks and pipeline runs -->
  <!-- Mon -->
  <line x1="110" y1="373" x2="110" y2="383" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="110" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Mon</text>
  <rect x="100" y="354" width="20" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="110" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0f172a">✓</text>

  <!-- Tue -->
  <line x1="290" y1="373" x2="290" y2="383" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="290" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Tue</text>
  <rect x="280" y="354" width="20" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="290" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0f172a">✓</text>

  <!-- Wed - failed -->
  <line x1="470" y1="373" x2="470" y2="383" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="470" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Wed</text>
  <rect x="460" y="354" width="20" height="20" rx="3" fill="#f43f5e" opacity="0.7"/>
  <text x="470" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0f172a">✗</text>
  <text x="470" y="412" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#f43f5e">→ email alert sent</text>

  <!-- Thu -->
  <line x1="650" y1="373" x2="650" y2="383" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="650" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Thu</text>
  <rect x="640" y="354" width="20" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="650" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0f172a">✓</text>

  <!-- Fri -->
  <line x1="830" y1="373" x2="830" y2="383" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="830" y="395" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Fri</text>
  <rect x="820" y="354" width="20" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="830" y="368" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0f172a">✓</text>

  <!-- Idempotent note -->
  <text x="66" y="436" font-family="ui-monospace,monospace" font-size="11" fill="#475569">idempotent runs: safe to re-trigger after failure  ·  INSERT OR REPLACE / upsert</text>

  <!-- Footer -->
  <text x="510" y="476" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#334155">automate · schedule · monitor · alert · recover</text>
</svg>
